<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BE THE HERO — Strukturerad övningsmodell</title>
<style>
:root {
  --bg:#0d1117; --s1:#161b27; --s2:#1e2535; --s3:#252d40;
  --border:#2a3249; --purple:#7c3aed; --pl:#a78bfa; --pp:rgba(124,58,237,.12);
  --text:#e8edf8; --muted:#7a8499; --dim:#4a5568;
  --gult:#f59e0b; --gront:#10b981; --blatt:#3b82f6; --rott:#ef4444;
  --bth:#1B2A6B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
button,input,select,textarea{font-family:inherit;}

/* TOPBAR */
.topbar{height:54px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand-h{width:30px;height:30px;background:var(--bth);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;}
.brand-text{font-size:11pt;font-weight:800;letter-spacing:.5px;line-height:1;}
.brand-sub{font-size:9pt;color:var(--muted);margin-top:3px;line-height:1;}
.schema-pill{font-size:9pt;font-weight:700;background:var(--pp);color:var(--pl);padding:3px 9px;border-radius:4px;border:1px solid rgba(124,58,237,.25);letter-spacing:.3px;}
.back-link{margin-left:auto;font-size:12px;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:5px;transition:all .12s;}
.back-link:hover{color:var(--text);border-color:var(--pl);}

/* LAYOUT */
#app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 54px);}
.sidebar{background:var(--s1);border-right:1px solid var(--border);padding:18px 14px;overflow-y:auto;height:calc(100vh - 54px);position:sticky;top:54px;}
.sidebar-info{font-size:11px;color:var(--muted);line-height:1.6;padding:11px;background:var(--s2);border-radius:7px;margin-bottom:16px;}
.section-divider{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--border);}
.ex-list{display:flex;flex-direction:column;gap:6px;}
.ex-item{padding:11px 12px;background:var(--s2);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .12s;}
.ex-item:hover{border-color:var(--pl);}
.ex-item.active{background:var(--pp);border-color:var(--purple);}
.ex-item-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.ex-item-meta{font-size:10px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;}
.ex-item-id{font-size:9px;color:var(--dim);margin-top:3px;font-family:monospace;}
.ex-item-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.ex-item-badge{display:inline-block;font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;}
.ex-item-badge.new{background:rgba(124,58,237,.2);color:var(--pl);}
.ex-item-badge.legacy{background:rgba(245,158,11,.15);color:var(--gult);}
.ex-item-badge.extra{background:rgba(239,68,68,.15);color:var(--rott);}
.ex-item-badge.qa-ok{background:rgba(16,185,129,.15);color:var(--gront);}
.ex-item-badge.qa-warn{background:rgba(245,158,11,.15);color:var(--gult);}
.ex-item-badge.qa-bad{background:rgba(239,68,68,.15);color:var(--rott);}

.main{padding:24px 28px;overflow-y:auto;max-width:1100px;}
.tabs{display:flex;gap:2px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:22px;}
.tab{flex:1;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:9px 12px;border-radius:5px;cursor:pointer;transition:all .12s;}
.tab:hover{color:var(--text);}
.tab.on{background:var(--purple);color:#fff;}

/* ══════════════════════════════════════
   LÄRARVY
══════════════════════════════════════ */
.tv-header{margin-bottom:20px;}
.tv-h1{font-size:30px;font-weight:900;color:var(--text);line-height:1.1;margin-bottom:8px;letter-spacing:-.3px;}
.tv-short{font-size:15px;color:#b0bcd4;line-height:1.6;margin-bottom:14px;max-width:680px;}
.tv-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.tv-meta-tag{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;}
.tv-meta-tag.alder{background:var(--pp);color:var(--pl);border-color:rgba(124,58,237,.25);}
.tv-meta-tag.safety-extra{background:rgba(239,68,68,.08);color:var(--rott);border-color:rgba(239,68,68,.25);}
.tv-meta-tag.safety-elev{background:rgba(245,158,11,.08);color:var(--gult);border-color:rgba(245,158,11,.25);}

.tv-image{margin-bottom:18px;border:1px solid var(--border);border-radius:8px;overflow:hidden;max-width:520px;}
.tv-image img{width:100%;height:auto;display:block;}

/* Tydlig label-stil för sektionsrubriker (ersätter emoji-thumbnails) */
.tv-section-h{padding:13px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.015);display:flex;align-items:center;gap:10px;}
.tv-section-mark{width:3px;height:14px;background:var(--pl);border-radius:2px;}
.tv-section-title{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text);}

/* Safety-banner överst om extra_care */
.tv-safety-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18);border-left:3px solid var(--rott);border-radius:6px;margin-bottom:14px;}
.tv-safety-banner-tag{font-size:9px;font-weight:800;letter-spacing:1.2px;color:var(--rott);text-transform:uppercase;}
.tv-safety-banner-text{font-size:12px;color:#f0c4c4;}

.tv-purpose-card{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--border);border-left:3px solid var(--pl);border-radius:8px;padding:14px 16px;margin-bottom:22px;}
.tv-purpose-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--pl);margin-bottom:6px;}
.tv-purpose-text{font-size:14px;color:var(--text);line-height:1.65;}
.tv-section{background:var(--s1);border:1px solid var(--border);border-radius:9px;margin-bottom:14px;overflow:hidden;}
.tv-section-h{padding:13px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.015);display:flex;align-items:center;gap:8px;}
.tv-section-icon{font-size:16px;}
.tv-section-title{font-size:12px;font-weight:800;letter-spacing:.3px;}
.tv-section-b{padding:16px;}
.tv-prose{font-size:13.5px;color:#c8d3e8;line-height:1.65;}
.tv-prose strong{color:var(--text);font-weight:600;}
.tv-safe-start{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.25);border-left:4px solid var(--gront);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.tv-safe-start-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gront);margin-bottom:6px;}
.tv-safe-start-text{font-size:14px;color:var(--text);line-height:1.55;font-style:italic;}
.tv-steps{display:flex;flex-direction:column;gap:14px;}
.tv-step{display:flex;gap:14px;align-items:flex-start;}
.tv-step-num{width:32px;height:32px;background:var(--purple);color:#fff;border-radius:50%;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.tv-step-content{flex:1;min-width:0;}
.tv-step-title-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.tv-step-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;}
.tv-step-time{font-size:11px;font-weight:600;color:var(--muted);background:var(--s2);padding:2px 8px;border-radius:4px;border:1px solid var(--border);white-space:nowrap;}
.tv-step-body{font-size:13px;color:#b0bcd4;line-height:1.6;margin-bottom:8px;}
.tv-step-subitems{list-style:none;padding-left:0;display:flex;flex-direction:column;gap:5px;margin:8px 0;}
.tv-step-subitems li{font-size:12.5px;color:#9aaac4;padding-left:18px;position:relative;line-height:1.5;}
.tv-step-subitems li::before{content:'·';position:absolute;left:6px;color:var(--pl);font-weight:800;}
.tv-step-says{background:rgba(124,58,237,.07);border-left:2px solid var(--pl);padding:8px 12px;border-radius:0 5px 5px 0;font-size:12.5px;color:var(--pl);font-style:italic;margin-top:8px;}
.tv-step-says-lbl{font-style:normal;font-weight:700;letter-spacing:.5px;font-size:11px;display:block;margin-bottom:3px;}
.tv-questions{display:flex;flex-direction:column;gap:1px;}
.tv-q{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;color:#b0bcd4;align-items:flex-start;}
.tv-q:last-child{border-bottom:none;}
.tv-q-num{color:var(--pl);font-weight:800;flex-shrink:0;font-size:13px;}
.tv-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;}
.tv-list li{font-size:13px;color:#b0bcd4;line-height:1.55;padding-left:20px;position:relative;}
.tv-list li::before{content:'→';position:absolute;left:0;color:var(--pl);}
.tv-risk{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-left:4px solid var(--rott);border-radius:7px;padding:12px 14px;margin-bottom:12px;}
.tv-risk-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--rott);margin-bottom:6px;}
.tv-risk-text{font-size:13px;color:#f0c4c4;line-height:1.55;}
.tv-print-mat{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:12px 14px;display:flex;gap:14px;align-items:center;}
.tv-print-mat-info{flex:1;min-width:0;}
.tv-print-mat-title{font-size:13px;font-weight:700;color:var(--text);}
.tv-print-mat-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
.tv-print-mat-file{font-size:10px;color:var(--muted);font-family:'SF Mono',Monaco,monospace;margin-top:4px;opacity:.7;}
.tv-print-mat-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.tv-print-mat-btn{background:var(--s3);border:1px solid var(--border);color:var(--text);font-size:11px;font-weight:600;padding:6px 12px;border-radius:5px;cursor:pointer;text-decoration:none;text-align:center;display:inline-block;transition:all .12s;min-width:78px;}
.tv-print-mat-btn:hover{background:var(--pl);color:#fff;border-color:var(--pl);}
.tv-print-mat-btn.primary{background:var(--pl);color:#fff;border-color:var(--pl);}
.tv-print-mat-btn.primary:hover{filter:brightness(1.1);}
.tv-print-mat-preview{width:54px;height:76px;background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;flex-shrink:0;position:relative;}
.tv-print-mat-preview iframe{width:210mm;height:297mm;border:0;transform:scale(0.257);transform-origin:top left;pointer-events:none;}
.tv-print-mat-preview-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);background:var(--s3);}

/* ══════════════════════════════════════
   PRESENTATIONSLÄGE — projektor-känsla
══════════════════════════════════════ */
.pres-header{margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.pres-header-title{font-size:13px;color:var(--text);font-weight:700;}
.pres-header-sub{font-size:11px;color:var(--muted);}
.pres-fullscreen-btn{margin-left:auto;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;padding:7px 14px;border-radius:5px;cursor:pointer;transition:all .12s;}
.pres-fullscreen-btn:hover{border-color:var(--pl);color:var(--pl);}

.pres-frame{background:#0a0d14;border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 10px 40px rgba(0,0,0,.4);}
.pres-toolbar{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px;background:#080b10;}
.pres-toolbar-eye{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.pres-toolbar-counter{margin-left:auto;font-size:13px;color:rgba(255,255,255,.55);font-weight:600;}
.pres-toolbar-counter strong{color:#fff;}

/* Projektorläge — riktig presentation-känsla */
.pres-stage{padding:80px 80px 70px;min-height:600px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;transition:background .35s;}
.pres-stage[data-mood="energetic"]{background:radial-gradient(ellipse at top right,rgba(124,58,237,.18),transparent 60%),radial-gradient(ellipse at bottom left,rgba(245,158,11,.06),transparent 70%),#0a0d14;}
.pres-stage[data-mood="calm"]{background:radial-gradient(ellipse at bottom,rgba(59,130,246,.12),transparent 60%),#0a0d14;}
.pres-stage[data-mood="focused"]{background:radial-gradient(ellipse at center,rgba(124,58,237,.04),transparent 70%),#0a0d14;}
.pres-stage[data-mood="still"]{background:radial-gradient(ellipse at center,rgba(255,255,255,.03),transparent 80%),#070a10;}
.pres-stage[data-mood="collaborative"]{background:radial-gradient(ellipse at top left,rgba(16,185,129,.12),transparent 60%),radial-gradient(ellipse at bottom right,rgba(59,130,246,.06),transparent 70%),#0a0d14;}
.pres-stage[data-mood="clear"]{background:#0a0d14;}

.pres-slide{max-width:880px;width:100%;animation:slideIn .45s cubic-bezier(.2,.8,.4,1);}
@keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.pres-slide-type{display:inline-flex;align-items:center;gap:7px;font-size:10px;color:rgba(255,255,255,.5);font-weight:800;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:24px;padding:4px 11px;border:1px solid rgba(255,255,255,.15);border-radius:20px;background:rgba(255,255,255,.03);}
.pres-slide-type-dot{width:6px;height:6px;border-radius:50%;background:var(--pl);}
.pres-slide-title{font-size:clamp(42px,6vw,64px);font-weight:900;color:#fff;line-height:1.05;margin-bottom:28px;letter-spacing:-.8px;}
.pres-slide-body{font-size:clamp(20px,2.6vw,28px);color:rgba(255,255,255,.85);line-height:1.55;white-space:pre-line;max-width:780px;font-weight:300;}
.pres-slide-prompt{font-size:clamp(22px,2.8vw,32px);color:#fff;line-height:1.4;margin-top:30px;padding:20px 26px;border-left:4px solid var(--pl);background:rgba(124,58,237,.1);border-radius:0 10px 10px 0;font-weight:500;}
.pres-slide-duration{position:absolute;bottom:28px;right:34px;font-size:11px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1px;}

/* Per-typ variation (utöver mood) */
.pres-stage[data-type="intro"] .pres-slide{text-align:center;}
.pres-stage[data-type="intro"] .pres-slide-title{font-size:clamp(46px,7vw,72px);}
.pres-stage[data-type="closing"] .pres-slide{text-align:center;}
.pres-stage[data-type="closing"] .pres-slide-title{color:rgba(255,255,255,.92);}
.pres-stage[data-type="closing"] .pres-slide-body{font-style:italic;color:rgba(255,255,255,.7);}
.pres-stage[data-type="reflection"] .pres-slide{text-align:center;}
.pres-stage[data-type="reflection"] .pres-slide-title::before{content:'"';color:rgba(124,58,237,.3);font-size:120px;line-height:0;display:block;font-family:Georgia,serif;margin-bottom:-30px;}
.pres-stage[data-type="voting"] .pres-slide-title{color:#fbbf24;}
.pres-stage[data-type="discussion"] .pres-slide-title,
.pres-stage[data-type="open_discussion"] .pres-slide-title,
.pres-stage[data-type="group_activity"] .pres-slide-title{color:#86efac;}
.pres-stage[data-type="individual_task"] .pres-slide-title,
.pres-stage[data-type="creative_task"] .pres-slide-title{color:#a78bfa;}
.pres-stage[data-type="instruction"] .pres-slide{border-left:3px solid var(--pl);padding-left:30px;}

/* Silence-slide — minimalistisk */
.pres-stage.silence-slide{justify-content:center;}
.pres-stage.silence-slide .pres-slide{text-align:center;}
.pres-stage.silence-slide .pres-slide-type{display:none;}
.pres-stage.silence-slide .pres-slide-title{font-size:clamp(24px,3.5vw,36px);color:rgba(255,255,255,.5);font-weight:300;letter-spacing:14px;text-transform:uppercase;}
.pres-stage.silence-slide .pres-slide-body{display:none;}

.pres-arrows{padding:16px 18px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px;background:#080b10;}
.pres-arrow{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);width:44px;height:40px;border-radius:6px;font-size:18px;cursor:pointer;transition:all .15s;}
.pres-arrow:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;}
.pres-arrow:disabled{opacity:.2;cursor:default;}
.pres-progress-track{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.pres-progress-fill{height:100%;background:var(--pl);transition:width .3s;}
.pres-slide-meta{font-size:11px;color:rgba(255,255,255,.4);min-width:90px;text-align:right;}

/* Lärarinstruktion — separat box utanför projektor-vyn */
.pres-teacher-help{margin-top:18px;background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.25);border-radius:9px;overflow:hidden;}
.pres-teacher-help-h{padding:11px 16px;background:rgba(124,58,237,.05);border-bottom:1px solid rgba(124,58,237,.15);display:flex;align-items:center;gap:8px;}
.pres-teacher-help-label{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--pl);text-transform:uppercase;}
.pres-teacher-help-tag{font-size:9px;background:rgba(239,68,68,.15);color:var(--rott);padding:2px 7px;border-radius:3px;font-weight:700;margin-left:auto;letter-spacing:.5px;}
.pres-teacher-help-b{padding:14px 16px;font-size:13px;color:#c8d3e8;line-height:1.6;}

.pres-meta-bar{display:flex;justify-content:space-between;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:7px;margin-top:14px;font-size:11px;color:var(--muted);}

/* ══════════════════════════════════════
   PDF-PREVIEW — rent dokument
══════════════════════════════════════ */
.pdf-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.pdf-frame{background:#525252;padding:30px;border-radius:8px;display:flex;justify-content:center;}
.pdf-page{background:#fff;color:#1a1a2e;padding:18mm 18mm 22mm;width:210mm;min-height:297mm;font-family:-apple-system,sans-serif;font-size:11pt;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,.4);position:relative;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.pdf-section, .pdf-steps-section, .pdf-safe, .pdf-risk{page-break-inside:avoid;}
.pdf-step{page-break-inside:avoid;}

/* PDF — Header (rent och diskret BTH-branding) */
.pdf-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;margin-bottom:22px;border-bottom:2px solid #1B2A6B;}
.pdf-brand{display:flex;align-items:center;gap:10px;}
.pdf-logo{width:34px;height:34px;background:#1B2A6B;color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;}
.pdf-brand-text{font-size:8.5pt;color:#64748b;letter-spacing:.5px;}
.pdf-brand-text strong{display:block;font-size:10.5pt;color:#1B2A6B;letter-spacing:1.2px;font-weight:800;}
.pdf-doc-info{text-align:right;}
.pdf-doctype{font-size:7.5pt;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.pdf-id{font-size:8pt;color:#94a3b8;margin-top:3px;font-family:'SF Mono',Monaco,monospace;}

/* PDF — Titel & metadata */
.pdf-title{font-size:24pt;font-weight:900;color:#1B2A6B;line-height:1.05;margin-bottom:8px;letter-spacing:-.4px;}
.pdf-short{font-size:11.5pt;color:#475569;line-height:1.55;margin-bottom:14px;}
.pdf-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.pdf-mtag{font-size:8.5pt;font-weight:600;padding:3px 9px;border-radius:4px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}
.pdf-mtag.primary{background:#EEF4FF;color:#2B5FBF;border-color:#c7d2fe;}
.pdf-mtag.warn{background:#fef3c7;color:#92400e;border-color:#fcd34d;}

/* PDF — Lärarsyfte */
.pdf-purpose{background:#f8fafc;border-left:3px solid #1B2A6B;padding:11px 14px;margin-bottom:18px;font-size:10pt;color:#334155;line-height:1.6;font-style:italic;}

/* PDF — Säg detta först */
.pdf-safe{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:11px 14px;margin-bottom:18px;display:flex;gap:12px;align-items:flex-start;}
.pdf-safe-icon{width:24px;height:24px;background:#16a34a;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12pt;font-weight:800;flex-shrink:0;}
.pdf-safe-content{flex:1;}
.pdf-safe-lbl{font-size:8pt;font-weight:800;letter-spacing:1.2px;color:#15803d;margin-bottom:4px;text-transform:uppercase;}
.pdf-safe-text{font-size:10pt;color:#1a1a2e;line-height:1.55;font-weight:500;}

/* PDF — Sektioner */
.pdf-section{margin-bottom:20px;page-break-inside:avoid;}
.pdf-section-title{font-size:8.5pt;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#1B2A6B;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #cbd5e1;}

/* PDF — Förberedelse */
.pdf-prep-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.pdf-prep-block{background:#f8fafc;padding:10px 12px;border-radius:5px;border-left:2px solid #cbd5e1;}
.pdf-prep-label{font-size:7.5pt;font-weight:800;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.pdf-prep-text{font-size:9.5pt;color:#1a1a2e;line-height:1.5;}

/* PDF — Genomförande (mest framträdande) */
.pdf-steps-section{background:#fafbff;border:1px solid #e0e7ff;border-radius:8px;padding:16px 18px;margin-bottom:20px;}
.pdf-steps-section .pdf-section-title{color:#1B2A6B;border-bottom-color:#c7d2fe;margin-bottom:14px;}
.pdf-intro-text{font-size:10pt;color:#475569;font-style:italic;margin-bottom:14px;padding-left:12px;border-left:2px solid #c7d2fe;}
.pdf-steps{list-style:none;padding:0;display:flex;flex-direction:column;gap:12px;}
.pdf-step{display:flex;gap:14px;align-items:flex-start;}
.pdf-stepnum{width:30px;height:30px;background:#1B2A6B;color:#fff;border-radius:50%;font-size:11pt;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pdf-stepbody{flex:1;min-width:0;background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:12px 14px;}
.pdf-stepheader{display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
.pdf-steptitle{font-size:11.5pt;font-weight:700;color:#1B2A6B;line-height:1.3;flex:1;}
.pdf-steptime{font-size:8pt;font-weight:700;color:#64748b;background:#f1f5f9;padding:3px 9px;border-radius:4px;border:1px solid #e2e8f0;white-space:nowrap;letter-spacing:.3px;}
.pdf-steptext{font-size:10pt;color:#334155;line-height:1.55;margin-top:4px;}
.pdf-stepsub{list-style:none;padding:0;margin-top:8px;padding-left:14px;border-left:1px solid #e2e8f0;}
.pdf-stepsub li{font-size:9.5pt;color:#475569;line-height:1.5;padding:3px 0;position:relative;padding-left:16px;}
.pdf-stepsub li::before{content:'·';position:absolute;left:6px;color:#1B2A6B;font-weight:800;}
.pdf-stepsays{margin-top:9px;font-size:9.5pt;color:#4c1d95;background:#faf5ff;padding:9px 12px;border-radius:4px;border-left:2px solid #a78bfa;}
.pdf-stepsays-lbl{font-size:7.5pt;font-weight:800;letter-spacing:1px;color:#6d28d9;text-transform:uppercase;display:block;margin-bottom:3px;}
.pdf-outro-text{font-size:10pt;color:#475569;font-style:italic;margin-top:14px;padding:10px 12px;background:#f1f5f9;border-radius:5px;}

/* PDF — Reflektion */
.pdf-refs{list-style:none;padding:0;}
.pdf-refs li{padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:10.5pt;color:#1a1a2e;display:flex;gap:10px;}
.pdf-refs li:last-child{border-bottom:none;}
.pdf-q{color:#2B5FBF;font-weight:800;flex-shrink:0;}

/* PDF — Tips & risker */
.pdf-tips{background:#fefce8;border-left:3px solid #ca8a04;padding:11px 14px;border-radius:5px;}
.pdf-tips ul{list-style:none;padding:0;font-size:10pt;color:#713f12;line-height:1.6;}
.pdf-tips li{padding-left:16px;position:relative;margin-bottom:5px;}
.pdf-tips li::before{content:'•';position:absolute;left:0;color:#ca8a04;font-weight:800;}
.pdf-risk{background:#fef2f2;border:1px solid #fecaca;border-left:4px solid #dc2626;border-radius:6px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;}
.pdf-risk-icon{width:24px;height:24px;background:#dc2626;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11pt;font-weight:800;flex-shrink:0;}
.pdf-risk-content{flex:1;}
.pdf-risk-lbl{font-size:8pt;font-weight:800;letter-spacing:1.2px;color:#991b1b;margin-bottom:4px;text-transform:uppercase;}
.pdf-risk-text{font-size:9.5pt;color:#7f1d1d;line-height:1.55;}

/* PDF — Utskriftsmaterial */
.pdf-material-list{display:flex;flex-direction:column;gap:8px;}
.pdf-material{background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;}
.pdf-material-info{flex:1;}
.pdf-material-title{font-size:10pt;font-weight:700;color:#1a1a2e;}
.pdf-material-desc{font-size:9pt;color:#64748b;margin-top:2px;}
.pdf-material-file{font-size:8pt;color:#94a3b8;font-family:'SF Mono',Monaco,monospace;}

/* PDF — Footer */
.pdf-footer{margin-top:28px;padding-top:10px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:7.5pt;color:#94a3b8;}

/* ══════════════════════════════════════
   JSON
══════════════════════════════════════ */
.json-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.json-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;padding:7px 14px;border-radius:6px;cursor:pointer;transition:all .12s;}
.json-btn:hover{border-color:var(--pl);color:var(--pl);}
.json-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.json-btn.primary:hover{background:#6d28d9;color:#fff;}
.json-info{font-size:11px;color:var(--muted);margin-left:auto;}
.json-box{background:#0a0d14;border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:11.5px;color:#a8b5d1;overflow-x:auto;max-height:600px;overflow-y:auto;white-space:pre;line-height:1.6;}
.json-key{color:#a78bfa;}
.json-string{color:#86efac;}
.json-number{color:#fbbf24;}
.json-boolean{color:#60a5fa;}
.json-null{color:#94a3b8;font-style:italic;}

/* ══════════════════════════════════════
   ADMIN & QA
══════════════════════════════════════ */
.admin-section{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:18px;margin-bottom:16px;}
.admin-section-title{font-size:12px;font-weight:800;letter-spacing:.3px;margin-bottom:12px;color:var(--text);}
.admin-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center;gap:10px;}
.admin-row:last-child{border-bottom:none;}
.admin-key{color:var(--muted);flex-shrink:0;}
.admin-val{font-weight:600;text-align:right;color:var(--text);}
.admin-status-pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;}
.admin-status-pill.klar_for_portal{background:rgba(16,185,129,.12);color:var(--gront);}
.admin-status-pill.utkast{background:rgba(74,85,104,.15);color:#9ca3af;}
.admin-status-pill.exporterad{background:rgba(59,130,246,.12);color:#3b82f6;}
.admin-notes{font-size:12.5px;color:#b0bcd4;line-height:1.6;padding:10px;background:var(--s2);border-radius:6px;border-left:3px solid var(--pl);}

/* QA — Trafikljus */
.qa-summary{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);gap:14px;}
.qa-summary-left{display:flex;align-items:center;gap:14px;}
.qa-light{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;}
.qa-light.green{background:var(--gront);box-shadow:0 0 14px rgba(16,185,129,.4);}
.qa-light.yellow{background:#f59e0b;box-shadow:0 0 14px rgba(245,158,11,.4);}
.qa-light.red{background:var(--rott);box-shadow:0 0 14px rgba(239,68,68,.4);}
.qa-summary-text{display:flex;flex-direction:column;gap:2px;}
.qa-summary-status{font-size:13px;font-weight:800;color:var(--text);}
.qa-summary-detail{font-size:11px;color:var(--muted);}
.qa-summary-score{font-size:22px;font-weight:900;color:var(--text);}

.qa-group{margin-bottom:18px;}
.qa-group-title{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--pl);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.qa-group-count{font-size:10px;color:var(--muted);font-weight:600;margin-left:auto;}
.qa-check{display:flex;gap:10px;padding:8px 0;font-size:12.5px;align-items:flex-start;border-bottom:1px solid var(--border);}
.qa-check:last-child{border-bottom:none;}
.qa-check-icon{width:18px;flex-shrink:0;text-align:center;}
.qa-check-light{display:inline-block;width:10px;height:10px;border-radius:50%;}
.qa-check.ok .qa-check-light{background:var(--gront);}
.qa-check.warn .qa-check-light{background:#f59e0b;}
.qa-check.miss .qa-check-light{background:var(--rott);}
.qa-check-content{flex:1;min-width:0;}
.qa-check-label{color:var(--text);font-weight:500;}
.qa-check.ok .qa-check-label{color:var(--muted);}
.qa-check-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.qa-check-suggest{font-size:11px;color:#f59e0b;margin-top:3px;font-style:italic;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:7px;font-size:12px;font-weight:600;z-index:3000;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-h">H</div>
    <div>
      <div class="brand-text">BE THE HERO</div>
      <div class="brand-sub">strukturerad övningsmodell</div>
    </div>
  </div>
  <span class="schema-pill">BTH Exercise Schema v1</span>
  <a href="index.html" class="back-link">← Tillbaka till banken</a>
</header>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-info">
      <strong style="color:var(--text);font-size:12px;display:block;margin-bottom:4px;">Facit för portal-export</strong>
      Testar att AI-agenten kan producera och befintliga BTH-övningar kan migreras till samma struktur.
    </div>
    <div class="ex-list" id="ex-list"></div>
  </aside>

  <main class="main">
    <div class="tabs">
      <button class="tab on" data-tab="teacher" onclick="switchTab('teacher')">📖 Lärarvy</button>
      <button class="tab" data-tab="presentation" onclick="switchTab('presentation')">🎬 Presentationsläge</button>
      <button class="tab" data-tab="pdf" onclick="switchTab('pdf')">🖨 PDF-preview</button>
      <button class="tab" data-tab="json" onclick="switchTab('json')">{ } JSON</button>
      <button class="tab" data-tab="admin" onclick="switchTab('admin')">⚙ Admin & QA</button>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let exercises = [];
let currentIdx = 0;
let currentTab = 'teacher';
let presSlideIdx = 0;

// Handlingsord — en betydligt bredare lista (svenska)
const ACTION_WORDS = /\b(Skriv|Visa|Dela|Diskutera|Rita|Berätta|Läs|Samla|Förklara|Bygg|Ge|Tänk|Be|Starta|Sätt|Förbered|Lyssna|Spela|Räkna|Klipp|Fyll|Markera|Rangordna|Välj|Avsluta|Lägg|Koppla|Hitta|Forma|Klippa|Fylla|Rösta|Lyft|Pausa|Fundera|Para|Bjud|Klippa|Limma|Para|Gå|Sitt|Sätt|Höj|Stanna|Andas|Föreställ|Möt|Räcka|Erbjud|Lös|Skapa|Bestäm|Avsätt|Hjälp|Visa|Hör|Kolla|Färglägg|Lyft|Drag|Lägg|Säg|Spara|Notera|Frågar|Frågan|Påminn|Bekräfta|Möblera|Skaka|Slänga|Bränna|Riv|Pröva|Provar|Provera|Bygga|Ringa|Vänta|Berätta|Använd|Använda|Be ut|Be om|Bjuda|Närmare|Närvara|Reflektera|Sammanfatta|Föra|Föras|Föregå|Iaktta)\b/i;

fetch('data/exercises-v2.json').then(r=>r.json()).then(data=>{
  exercises = data.exercises;
  renderSidebar();
  renderMain();
});

// Skriv ut printMaterial: öppna i nytt fönster och trigga utskrift när det laddats
function printMaterial(href){
  if(!href) return;
  const w = window.open(href, '_blank');
  if(!w){ alert('Tillåt popup-fönster för att skriva ut.'); return; }
  const triggerPrint = () => { try { w.focus(); w.print(); } catch(e) { console.warn(e); } };
  if(w.document && w.document.readyState === 'complete'){
    setTimeout(triggerPrint, 250);
  } else {
    w.addEventListener('load', () => setTimeout(triggerPrint, 250));
  }
}

// ══════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════
function renderSidebar(){
  const list = document.getElementById('ex-list');
  const nya = exercises.filter(e => !e.provenance?.source?.includes('Migrerad'));
  const legacy = exercises.filter(e => e.provenance?.source?.includes('Migrerad'));

  const renderGroup = (arr, label, badgeClass) => `
    <div class="section-divider">${label} (${arr.length})</div>
    ${arr.map(e => {
      const i = exercises.indexOf(e);
      const isExtra = e.safety?.level === 'extra_care';
      const qa = checkPortalReady(e);
      const qaClass = qa.light === 'green' ? 'qa-ok' : qa.light === 'yellow' ? 'qa-warn' : 'qa-bad';
      const qaLabel = qa.light === 'green' ? '✓ redo' : qa.light === 'yellow' ? '⚠ granska' : '✗ ej redo';
      return `<div class="ex-item ${i===currentIdx?'active':''}" onclick="selectExercise(${i})">
        <div class="ex-item-title">${e.title}</div>
        <div class="ex-item-meta">
          <span>${e.metadata.durationMinutes} min</span>
          <span>·</span>
          <span>Åk ${e.metadata.gradeRange.join(', ')}</span>
        </div>
        <div class="ex-item-id">${e.internal.id}</div>
        <div class="ex-item-badges">
          <span class="ex-item-badge ${badgeClass}">${label}</span>
          ${isExtra ? '<span class="ex-item-badge extra">⚠ extra_care</span>' : ''}
          <span class="ex-item-badge ${qaClass}">${qaLabel}</span>
        </div>
      </div>`;
    }).join('')}`;

  list.innerHTML = renderGroup(nya, 'Nya AI', 'new') + renderGroup(legacy, 'BTH-original', 'legacy');
}

function selectExercise(i){
  currentIdx = i;
  presSlideIdx = 0;
  renderSidebar();
  renderMain();
}

function switchTab(t){
  currentTab = t;
  presSlideIdx = 0;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  renderMain();
}

function renderMain(){
  if(!exercises.length) return;
  const e = exercises[currentIdx];
  const c = document.getElementById('content');
  if(currentTab==='teacher')           c.innerHTML = renderTeacherView(e);
  else if(currentTab==='presentation') c.innerHTML = renderPresentationView(e);
  else if(currentTab==='pdf')          c.innerHTML = renderPdfPreview(e);
  else if(currentTab==='json')         c.innerHTML = renderJsonView(e);
  else if(currentTab==='admin')        c.innerHTML = renderAdminView(e);
}

// ══════════════════════════════════════
// LÄRARVY
// ══════════════════════════════════════
function renderTeacherView(e){
  const m = e.metadata, ls = e.lessonSetup, impl = e.implementation, ts = e.teacherSupport;
  const safety = e.safety||{};

  const safetyTag = safety.level==='extra_care' ? '<span class="tv-meta-tag safety-extra">Extra varsamhet</span>'
                  : safety.level==='elevhalsa_recommended' ? '<span class="tv-meta-tag safety-elev">Elevhälsa rekommenderas</span>' : '';

  // ── HERO IMAGE: bara om riktig bild, INGET visas om saknas (intern info hamnar i Admin) ──
  let imageHTML = '';
  if(e.image && e.image.url && !e.image.url.includes('hero-logo')){
    imageHTML = `<div class="tv-image"><img src="${e.image.url}" alt="${e.image.alt||''}" onerror="this.parentElement.style.display='none';"></div>`;
  }
  // Om image saknas: ingen yta i lärarvyn alls

  const safetyBanner = safety.level==='extra_care' ? `
    <div class="tv-safety-banner">
      <span class="tv-safety-banner-tag">Extra varsamhet</span>
      <span class="tv-safety-banner-text">${safety.note || 'Förvarna elevhälsan. Läs riskNote noga.'}</span>
    </div>` : '';

  const safeStartHTML = ls.safeStartText ? `
    <div class="tv-safe-start">
      <div class="tv-safe-start-label">Säg detta först — sätter trygg ram</div>
      <div class="tv-safe-start-text">"${ls.safeStartText}"</div>
    </div>` : '';

  const stepsHTML = (impl.steps||[]).map((s,i)=>{
    const subItems = s.subItems ? `<ul class="tv-step-subitems">${s.subItems.map(x=>`<li>${x}</li>`).join('')}</ul>` : '';
    const says = s.teacherSays ? `<div class="tv-step-says"><span class="tv-step-says-lbl">SÄG TILL ELEVERNA</span>${s.teacherSays}</div>` : '';
    const time = s.timeEstimate ? `<span class="tv-step-time">${s.timeEstimate}</span>` : '';
    return `<div class="tv-step">
      <div class="tv-step-num">${i+1}</div>
      <div class="tv-step-content">
        <div class="tv-step-title-row">
          <div class="tv-step-title">${s.title}</div>
          ${time}
        </div>
        <div class="tv-step-body">${s.body}</div>
        ${subItems}
        ${says}
      </div>
    </div>`;
  }).join('');

  const refsHTML = (e.reflection.questions||[]).map((q,i)=>`
    <div class="tv-q"><span class="tv-q-num">${i+1}.</span><span>${q}</span></div>`).join('');

  const resolvePrintMatHref = (p) => {
    if(p.filename && /\.html?$/i.test(p.filename)) return `affischer/${p.filename}`;
    if(p.filename) return p.filename;
    if(p.url) return p.url;
    return '';
  };
  const printMatHTML = (ls.printMaterials||[]).length ? `
    <div class="tv-section">
      <div class="tv-section-h"><span class="tv-section-mark"></span><span class="tv-section-title">Material att skriva ut</span></div>
      <div class="tv-section-b" style="display:flex;flex-direction:column;gap:10px;">
        ${ls.printMaterials.map(p=>{
          const href = resolvePrintMatHref(p);
          const isHtml = href && /\.html?$/i.test(href);
          const isPdf = href && /\.pdf$/i.test(href);
          const previewHTML = isHtml
            ? `<div class="tv-print-mat-preview"><iframe src="${href}" loading="lazy" sandbox></iframe></div>`
            : `<div class="tv-print-mat-preview"><div class="tv-print-mat-preview-icon">${isPdf?'📄':'📎'}</div></div>`;
          return `<div class="tv-print-mat">
          ${previewHTML}
          <div class="tv-print-mat-info">
            <div class="tv-print-mat-title">${p.title}</div>
            ${p.description?`<div class="tv-print-mat-desc">${p.description}</div>`:''}
            ${p.filename?`<div class="tv-print-mat-file">${p.filename}</div>`:''}
          </div>
          <div class="tv-print-mat-actions">
            ${href?`<a class="tv-print-mat-btn primary" href="${href}" target="_blank" rel="noopener">Öppna</a>`:''}
            ${href?`<button class="tv-print-mat-btn" onclick="printMaterial('${href.replace(/'/g,"\\'")}')">Skriv ut</button>`:''}
          </div>
        </div>`;
        }).join('')}
      </div>
    </div>` : '';

  const riskHTML = ts.riskNote ? `
    <div class="tv-risk">
      <div class="tv-risk-label">RISKER — LÄS INNAN DU KÖR</div>
      <div class="tv-risk-text">${ts.riskNote}</div>
    </div>` : '';

  const tipsHTML = (ts.tips||[]).length ? `
    <div class="tv-section">
      <div class="tv-section-h"><span class="tv-section-mark"></span><span class="tv-section-title">Tips</span></div>
      <div class="tv-section-b"><ul class="tv-list">${ts.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>
    </div>` : '';

  const adaptHTML = (ts.adaptations||[]).length ? `
    <div class="tv-section">
      <div class="tv-section-h"><span class="tv-section-mark"></span><span class="tv-section-title">Anpassningar</span></div>
      <div class="tv-section-b"><ul class="tv-list">${ts.adaptations.map(t=>`<li>${t}</li>`).join('')}</ul></div>
    </div>` : '';

  const npfHTML = ts.npfSupport ? `
    <div class="tv-section">
      <div class="tv-section-h"><span class="tv-section-mark"></span><span class="tv-section-title">NPF-stöd</span></div>
      <div class="tv-section-b"><p class="tv-prose">${ts.npfSupport}</p></div>
    </div>` : '';

  const followUpHTML = ts.followUp ? `
    <div class="tv-section">

// PRESENTATIONSLÄGE — projektor-känsla

function renderPresentationView(e){
  const presentations = e.presentations || [];
  if(!presentations.length){
    return `<div style="text-align:center;padding:80px 20px;color:var(--muted);">
      <div style="font-size:42px;margin-bottom:14px;opacity:.6;">🎬</div>
      <p>Denna övning har ingen presentation kopplad.</p>
    </div>`;
  }

  const pres = presentations.find(p => p.audience==='students') || presentations[0];
  const slides = pres.slides || [];
  if(!slides.length) return '<p>Presentationen har inga slides.</p>';

  const slide = slides[presSlideIdx];
  const progress = ((presSlideIdx+1) / slides.length) * 100;
  const mood = slide.mood || 'clear';
  const isSilence = slide.slideType === 'silence';

  return `
    <div class="pres-header">
      <div>
        <div class="pres-header-title">${pres.title}</div>
        <div class="pres-header-sub">Visas för: <strong style="color:var(--pl)">elever</strong> · ${slides.length} slides</div>
      </div>
    </div>

    <div class="pres-frame">
      <div class="pres-toolbar">
        <span class="pres-toolbar-eye">👁 Detta ser eleverna på projektorn</span>
        <span class="pres-toolbar-counter"><strong>${presSlideIdx+1}</strong> / ${slides.length}</span>
      </div>
      <div class="pres-stage ${isSilence?'silence-slide':''}" data-mood="${mood}" data-type="${slide.slideType||''}">
        <div class="pres-slide">
          ${slide.slideType ? `<span class="pres-slide-type"><span class="pres-slide-type-dot"></span>${slide.slideType.replace(/_/g,' ')}</span>` : ''}
          <h2 class="pres-slide-title">${slide.title}</h2>
          ${slide.body ? `<div class="pres-slide-body">${slide.body}</div>` : ''}
          ${slide.prompt ? `<div class="pres-slide-prompt">${slide.prompt}</div>` : ''}
        </div>
        ${slide.durationEstimate ? `<div class="pres-slide-duration">${slide.durationEstimate}</div>` : ''}
      </div>
      <div class="pres-arrows">
        <button class="pres-arrow" onclick="presPrev()" ${presSlideIdx===0?'disabled':''}>←</button>
        <div class="pres-progress-track"><div class="pres-progress-fill" style="width:${progress}%"></div></div>
        <span class="pres-slide-meta">${slide.mood||''}</span>
        <button class="pres-arrow" onclick="presNext()" ${presSlideIdx===slides.length-1?'disabled':''}>→</button>
      </div>
    </div>

    ${slide.instructionForTeacher ? `<div class="pres-teacher-help">
      <div class="pres-teacher-help-h">
        <span class="pres-teacher-help-label">👨‍🏫 Lärarinstruktion</span>
        <span class="pres-teacher-help-tag">VISAS INTE FÖR ELEVER</span>
      </div>
      <div class="pres-teacher-help-b">${slide.instructionForTeacher}</div>
    </div>` : ''}

    <div class="pres-meta-bar">
      <span>Slidetyp: <strong style="color:var(--text)">${slide.slideType}</strong> · Mood: <strong style="color:var(--text)">${slide.mood||'—'}</strong></span>
      <span>Bläddra: ← → eller mellanslag · ${pres.status}</span>
    </div>
  `;
}

function presNext(){
  const e = exercises[currentIdx];
  const pres = (e.presentations||[]).find(p=>p.audience==='students') || e.presentations[0];
  if(presSlideIdx < pres.slides.length-1){presSlideIdx++;renderMain();}
}
function presPrev(){if(presSlideIdx>0){presSlideIdx--;renderMain();}}

function exportableJson(e){
  const {internal, ...portalData} = e;
  return portalData;
}

function renderJsonView(e){
  const portalJson = JSON.stringify(exportableJson(e), null, 2);
  return `
    <div class="json-toolbar">
      <button class="json-btn primary" onclick="downloadJson()">💾 Exportera som JSON</button>
      <button class="json-btn" onclick="copyJson()">📋 Kopiera till clipboard</button>
      <button class="json-btn" onclick="toggleInternal()" id="internal-toggle">+ Visa interna fält</button>
      <span class="json-info">Portal-export: ${(portalJson.length/1024).toFixed(1)} kB · INGA internal-fält</span>
    </div>
    <div class="json-box" id="json-box"><code>${highlightJson(portalJson)}</code></div>
  `;
}

let showInternal = false;
function toggleInternal(){
  showInternal = !showInternal;
  const e = exercises[currentIdx];
  const json = showInternal ? JSON.stringify(e, null, 2) : JSON.stringify(exportableJson(e), null, 2);
  document.getElementById('json-box').innerHTML = `<code>${highlightJson(json)}</code>`;
  document.getElementById('internal-toggle').innerHTML = showInternal ? '− Dölj interna fält' : '+ Visa interna fält';
}

function downloadJson(){
  const e = exercises[currentIdx];
  const data = JSON.stringify(exportableJson(e), null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${e.slug}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('✓ JSON-fil nedladdad');
}

function copyJson(){
  const e = exercises[currentIdx];
  const data = JSON.stringify(exportableJson(e), null, 2);
  navigator.clipboard.writeText(data).then(()=>toast('📋 JSON kopierad'));
}

function highlightJson(json){
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"\\]*(\\.[^"\\]*)*)"(\s*:)/g, '<span class="json-key">"$1"</span>$3')
    .replace(/: "([^"\\]*(\\.[^"\\]*)*)"/g, ': <span class="json-string">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="json-number">$1</span>')
    .replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>')
    .replace(/: null/g, ': <span class="json-null">null</span>');
}

// ══════════════════════════════════════
// QA — Trafikljus-system (grönt/gult/rött)
// ══════════════════════════════════════
function checkPortalReady(e){
  // Varje check har: status (ok/warn/miss) + label + detail + suggestion
  const groups = {
    'Obligatoriskt innehåll': [],
    'Struktur & genomförande': [],
    'Säkerhet & kvalitet': [],
    'Utskriftsmaterial': [],
    'Intern/publik separation': []
  };

  const add = (group, status, label, detail='', suggest='') => {
    groups[group].push({status, label, detail, suggest});
  };

  // ══ OBLIGATORISKT ══
  add('Obligatoriskt innehåll',
    e.title && e.title.length>=3 && e.title.length<=60 ? 'ok' : 'miss',
    'Titel finns och har lagom längd',
    e.title ? `${e.title.length} tecken` : 'Saknas');

  add('Obligatoriskt innehåll',
    e.shortDescription && e.shortDescription.length>=40 && e.shortDescription.length<=400 ? 'ok' : 'miss',
    'Kort beskrivning (40–400 tecken)',
    e.shortDescription ? `${e.shortDescription.length} tecken` : 'Saknas',
    e.shortDescription && e.shortDescription.length<40 ? 'För kort — beskriv vad eleverna gör' : '');

  add('Obligatoriskt innehåll',
    e.teacherPurpose && e.teacherPurpose.length>=40 ? 'ok' : 'miss',
    'Lärarsyfte är välformulerat',
    e.teacherPurpose ? `${e.teacherPurpose.length} tecken` : 'Saknas');

  add('Obligatoriskt innehåll',
    e.metadata && e.metadata.durationMinutes>0 && (e.metadata.gradeRange||[]).length>0 ? 'ok' : 'miss',
    'Metadata komplett (tid, åldrar, arbetsform)',
    '');

  add('Obligatoriskt innehåll',
    (e.reflection?.questions||[]).length>=2 ? 'ok' : 'miss',
    'Reflektionsfrågor (minst 2)',
    `${(e.reflection?.questions||[]).length} st`);

  // ══ STRUKTUR ══
  add('Struktur & genomförande',
    (e.implementation?.steps||[]).length>=2 ? 'ok' : 'miss',
    'Minst 2 genomförandesteg',
    `${(e.implementation?.steps||[]).length} steg`);

  add('Struktur & genomförande',
    (e.implementation?.steps||[]).every(s=>s.title && s.body) ? 'ok' : 'miss',
    'Varje steg har både titel och body',
    '');

  // Handlingsord — bredare check, varning (gult) istället för fel
  const stepsWithoutAction = (e.implementation?.steps||[]).filter(s=>!ACTION_WORDS.test(s.title)).length;
  add('Struktur & genomförande',
    stepsWithoutAction === 0 ? 'ok' : (stepsWithoutAction <= 1 ? 'warn' : 'miss'),
    'Stegtitlar börjar med handlingsord',
    stepsWithoutAction === 0 ? '' : `${stepsWithoutAction} steg utan tydligt verb`,
    stepsWithoutAction > 0 ? 'Använd Skriv/Visa/Diskutera/Rita osv.' : '');

  const longSteps = (e.implementation?.steps||[]).filter(s => s.body && s.body.length > 600).length;
  add('Struktur & genomförande',
    longSteps === 0 ? 'ok' : 'warn',
    'Inget steg är för långt (max 600 tecken)',
    longSteps ? `${longSteps} långa steg` : '');

  const hasPresentation = (e.presentations||[]).length>0 && (e.presentations[0].slides||[]).length>=3;
  add('Struktur & genomförande',
    hasPresentation ? 'ok' : 'warn',
    'Presentation finns kopplad (minst 3 slides)',
    e.presentations?.length ? `${e.presentations[0].slides?.length||0} slides` : 'Saknas',
    !hasPresentation ? 'Övning utan elevvy är svår att leverera' : '');

  // ══ SÄKERHET & KVALITET ══
  // safeStart specifik
  const ss = e.lessonSetup?.safeStartText || '';
  const isGeneric = ss && /^(välkommen|hej|idag ska vi|nu ska vi)\.?\s*$/i.test(ss.trim());
  add('Säkerhet & kvalitet',
    !ss ? 'warn' : (isGeneric ? 'warn' : (ss.length>20 ? 'ok' : 'warn')),
    'safeStartText är specifik (inte generisk)',
    !ss ? 'Saknas' : (isGeneric ? 'För generisk' : ''),
    !ss ? 'Lägg till en mening som sätter trygg ram för just denna övning' : '');

  // safeStart krävs vid extra_care
  const isExtra = e.safety?.level==='extra_care';
  add('Säkerhet & kvalitet',
    !isExtra || (ss && ss.length>20) ? 'ok' : 'miss',
    'safeStart finns vid extra_care',
    !isExtra ? 'Krävs ej' : (ss?'OK':'Saknas'),
    isExtra && !ss ? 'extra_care-övningar MÅSTE ha en trygg ram' : '');

  // riskNote vid extra_care
  add('Säkerhet & kvalitet',
    !isExtra || (e.teacherSupport?.riskNote && e.teacherSupport.riskNote.length>30) ? 'ok' : 'miss',
    'riskNote finns vid extra_care',
    !isExtra ? 'Krävs ej' : (e.teacherSupport?.riskNote?'OK':'Saknas'));

  // NPF-stöd specifikt
  const npf = e.teacherSupport?.npfSupport || '';
  add('Säkerhet & kvalitet',
    npf && npf.length>=30 ? 'ok' : 'warn',
    'NPF-stöd är specifikt och hjälpsamt',
    npf ? '' : 'Saknas',
    !npf ? 'Lägg till konkreta anpassningar för elever med NPF-behov' : '');

  // printMaterials — använder explicit requiresPrintMaterials-fält om det finns
  const hasPrint = (e.lessonSetup?.printMaterials||[]).length>0;
  if(typeof e.requiresPrintMaterials === 'boolean'){
    if(e.requiresPrintMaterials){
      add('Säkerhet & kvalitet',
        hasPrint ? 'ok' : 'miss',
        'printMaterials kopplade (krävs)',
        hasPrint?'OK':'Saknas',
        !hasPrint ? 'Lägg till PDF-mallar under lessonSetup.printMaterials' : '');
    } else {
      add('Säkerhet & kvalitet',
        'ok',
        'printMaterials — krävs ej för denna övning',
        '');
    }
  } else {
    // Osäkert — gul varning
    const looksLikePrint = (e.metadata?.materialNeeds||[]).some(m=>/utskrift|mall|kort|papper/i.test(m));
    add('Säkerhet & kvalitet',
      'warn',
      'requiresPrintMaterials saknas',
      looksLikePrint?'Material verkar peka mot utskrift':'',
      'Verifiera om utskriftsmaterial behövs och sätt requiresPrintMaterials: true/false');
  }

  // ══ UTSKRIFTSMATERIAL — per-item QA ══
  const pms = e.lessonSetup?.printMaterials || [];
  pms.forEach((p, idx) => {
    const label = (n) => `[${idx+1}] ${n}`;

    // kind satt + giltigt
    const validKinds = ['poster','worksheet','cards','template','discussion_cards'];
    add('Utskriftsmaterial',
      p.kind && validKinds.includes(p.kind) ? 'ok' : 'miss',
      label('kind är satt'),
      p.kind || 'saknas',
      !p.kind ? `Sätt kind till en av: ${validKinds.join(', ')}` : '');

    // title
    add('Utskriftsmaterial',
      p.title && p.title.length >= 3 ? 'ok' : 'miss',
      label('title finns'),
      p.title || 'saknas');

    // description tillräcklig
    add('Utskriftsmaterial',
      p.description && p.description.length >= 10 ? 'ok' : 'miss',
      label('description finns (≥10 tecken)'),
      p.description ? `${p.description.length} tecken` : 'saknas');

    // filename
    add('Utskriftsmaterial',
      p.filename && p.filename.length >= 3 ? 'ok' : 'miss',
      label('filename finns'),
      p.filename || 'saknas');

    // format A4
    add('Utskriftsmaterial',
      p.format === 'A4' ? 'ok' : (p.format ? 'warn' : 'miss'),
      label('format är satt'),
      p.format || 'saknas',
      p.format && p.format !== 'A4' ? `Format ${p.format} stöds men A4 är standard` : '');

    // audience
    const validAudience = ['classroom','student','teacher'];
    add('Utskriftsmaterial',
      p.audience && validAudience.includes(p.audience) ? 'ok' : 'miss',
      label('audience är satt'),
      p.audience || 'saknas',
      !p.audience ? `Sätt audience: ${validAudience.join(', ')}` : '');

    // printIntent
    add('Utskriftsmaterial',
      p.printIntent && p.printIntent.length >= 15 ? 'ok' : 'miss',
      label('printIntent förklarar användning'),
      p.printIntent ? `${p.printIntent.length} tecken` : 'saknas',
      !p.printIntent || p.printIntent.length < 15 ? 'Skriv minst 15 tecken om när läraren använder materialet' : '');

    // Koppling till övning
    const linksOk = (p.sourceExerciseId === e.internal?.id) || (p.exerciseSlug === e.slug);
    add('Utskriftsmaterial',
      linksOk ? 'ok' : 'warn',
      label('kopplat till rätt övning'),
      p.sourceExerciseId || p.exerciseSlug || 'saknas',
      !linksOk ? 'Sätt sourceExerciseId eller exerciseSlug så portal-renderaren kan bakåtkoppla' : '');

    // Textmängd — per kind
    if(p.kind === 'poster'){
      // Affisch-specifika QA-regler enligt BE THE HERO-affischmall
      const titleWords = (p.title||'').split(/\s+/).filter(Boolean).length;
      add('Utskriftsmaterial',
        titleWords <= 6 ? 'ok' : 'warn',
        label('Affisch-titel är kort (max 6 ord)'),
        `${titleWords} ord`,
        titleWords > 6 ? 'Affischtitel bör vara kort för läsbarhet på avstånd' : '');

      add('Utskriftsmaterial',
        (p.description||'').length <= 200 ? 'ok' : 'warn',
        label('Affisch-beskrivning är inte för lång'),
        `${(p.description||'').length} tecken`,
        (p.description||'').length > 200 ? 'Beskrivning är lärarstöd — affischen själv bör inte rymma så mycket text' : '');

      // Affisch ska vara i format A4
      add('Utskriftsmaterial',
        p.format === 'A4' ? 'ok' : 'warn',
        label('Affisch är A4'),
        p.format || '?',
        p.format !== 'A4' ? 'BE THE HERO-affischmallen är byggd för A4' : '');

      // Affisch ska riktas mot klassrum
      add('Utskriftsmaterial',
        p.audience === 'classroom' ? 'ok' : 'warn',
        label('Affisch riktas till klassrummet'),
        p.audience || '?',
        p.audience !== 'classroom' ? 'Affischer är klassrumsmaterial — sätt audience: classroom' : '');

      // safeMargin krävs för affischer
      add('Utskriftsmaterial',
        p.safeMargin === true ? 'ok' : 'miss',
        label('safeMargin: true (A4-safe area)'),
        p.safeMargin === true ? 'OK' : (p.safeMargin === false ? 'explicit false' : 'saknas'),
        p.safeMargin !== true ? 'Affischer MÅSTE följa A4-safe area och flagga safeMargin: true' : '');
    }

    // HTML-fil — kontrollera safeMargin-flagga (heuristik)
    if(p.filename && /\.html?$/i.test(p.filename) && p.safeMargin !== true){
      add('Utskriftsmaterial',
        'warn',
        label('safeMargin: true för HTML-affisch'),
        p.safeMargin === false ? 'explicit false' : 'saknas',
        'Sätt safeMargin: true när affischen följer A4-safe area (≥14mm marginal)');
    }

    // Internal-läckage — affischens filnamn ska inte avslöja interna ID-nummer som inte hör hemma
    // (bara varna om vi hittar internal: i filnamnet)
    if(p.filename && /internal|draft|utkast/i.test(p.filename)){
      add('Utskriftsmaterial',
        'warn',
        label('filename innehåller intern markör'),
        p.filename,
        'Byt filnamn så det inte avslöjar utkast-status mot eleven');
    }
  });

  // Bild-check — visa varning i Admin/QA (intern info), inte i lärarvy
  add('Säkerhet & kvalitet',
    e.image && e.image.url && !e.image.url.includes('hero-logo') ? 'ok' : 'warn',
    'Övningsbild finns (image.url)',
    e.image?.url ? 'OK' : 'Saknas',
    !e.image?.url ? 'Generera en relevant bild via Higgsfield eller liknande' : '');

  // teacherSays bara där det behövs
  const stepsWithSays = (e.implementation?.steps||[]).filter(s=>s.teacherSays).length;
  const totalSteps = (e.implementation?.steps||[]).length;
  add('Säkerhet & kvalitet',
    totalSteps === 0 || stepsWithSays / totalSteps <= 0.7 ? 'ok' : 'warn',
    'teacherSays används balanserat (max 70% av stegen)',
    `${stepsWithSays}/${totalSteps} steg har teacherSays`,
    stepsWithSays / totalSteps > 0.7 ? 'För mycket scriptat tal — låt läraren ha frihet' : '');

  // Övning för lång/informationsrik
  const totalLength = JSON.stringify(exportableJson(e)).length;
  add('Säkerhet & kvalitet',
    totalLength < 12000 ? 'ok' : (totalLength < 20000 ? 'warn' : 'miss'),
    'Övningen är inte för informationsrik',
    `${(totalLength/1024).toFixed(1)} kB`,
    totalLength >= 12000 ? 'Komplex övning — kan eleverna/läraren följa med?' : '');

  // ══ SEPARATION ══
  const publicJson = JSON.stringify(exportableJson(e));
  add('Intern/publik separation',
    !/TODO|FIXME|placeholder|XXX/i.test(publicJson) ? 'ok' : 'miss',
    'Inga TODO/placeholder i publik data',
    '');

  add('Intern/publik separation',
    !publicJson.includes(e.internal.id) ? 'ok' : 'warn',
    'Internt ID läcker inte till publik data',
    publicJson.includes(e.internal.id) ? `${e.internal.id} hittat i publika fält` : '');

  add('Intern/publik separation',
    !/\b(utkast|productionStatus|qualityChecklist)\b/i.test(publicJson) ? 'ok' : 'miss',
    'Inga produktionsord i publik text',
    '');

  // ══ Aggregat ══
  const allChecks = Object.values(groups).flat();
  const score = allChecks.filter(c=>c.status==='ok').length;
  const warnCount = allChecks.filter(c=>c.status==='warn').length;
  const missCount = allChecks.filter(c=>c.status==='miss').length;
  const total = allChecks.length;

  // Trafikljus: rött vid miss, gult vid warn, grönt om alla ok
  const light = missCount > 0 ? 'red' : (warnCount > 0 ? 'yellow' : 'green');
  const statusText = missCount > 0 ? 'Bör inte exporteras' : (warnCount > 0 ? 'Behöver redaktörsgranskning' : 'Klar att exporteras');

  return { groups, score, total, warnCount, missCount, light, statusText, pct: Math.round(score/total*100) };
}

function renderAdminView(e){
  const qa = checkPortalReady(e);
  const groupLabels = Object.keys(qa.groups);

  const groupsHTML = groupLabels.map((label,i) => {
    const checks = qa.groups[label];
    const okInGroup = checks.filter(c=>c.status==='ok').length;
    return `<div class="qa-group">
      <div class="qa-group-title">${i+1}. ${label} <span class="qa-group-count">${okInGroup}/${checks.length}</span></div>
      ${checks.map(c=>`
        <div class="qa-check ${c.status}">
          <span class="qa-check-icon"><span class="qa-check-light"></span></span>
          <div class="qa-check-content">
            <div class="qa-check-label">${c.label}</div>
            ${c.detail ? `<div class="qa-check-detail">${c.detail}</div>` : ''}
            ${c.suggest ? `<div class="qa-check-suggest">→ ${c.suggest}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');

  const prov = e.provenance || {};
  const intern = e.internal || {};

  return `
    <div class="admin-section">
      <div class="admin-section-title">📋 Klar för portal — kvalitetscheck</div>
      <div class="qa-summary">
        <div class="qa-summary-left">
          <div class="qa-light ${qa.light}">${qa.light==='green'?'✓':qa.light==='yellow'?'!':'✗'}</div>
          <div class="qa-summary-text">
            <div class="qa-summary-status">${qa.statusText}</div>
            <div class="qa-summary-detail">${qa.score} OK · ${qa.warnCount} varning${qa.warnCount===1?'':'ar'} · ${qa.missCount} fel</div>
          </div>
        </div>
        <div class="qa-summary-score">${qa.score}/${qa.total}</div>
      </div>
      ${groupsHTML}
    </div>

    <div class="admin-section">
      <div class="admin-section-title">📜 Provenance (publik)</div>
      <div class="admin-row"><span class="admin-key">Författare</span><span class="admin-val">${prov.author||'—'}</span></div>
      <div class="admin-row"><span class="admin-key">Källa</span><span class="admin-val" style="font-size:11px;">${prov.source||'—'}</span></div>
      <div class="admin-row"><span class="admin-key">Skapad</span><span class="admin-val">${prov.createdAt||'—'}</span></div>
      <div class="admin-row"><span class="admin-key">Språk</span><span class="admin-val">${prov.language||'—'}</span></div>
    </div>

    <div class="admin-section">
      <div class="admin-section-title">⚙ Intern metadata (exporteras EJ)</div>
      <div class="admin-row"><span class="admin-key">ID</span><span class="admin-val" style="font-family:monospace;font-size:11px;">${intern.id}</span></div>
      <div class="admin-row"><span class="admin-key">Slug</span><span class="admin-val" style="font-family:monospace;font-size:11px;">${e.slug}</span></div>
      <div class="admin-row"><span class="admin-key">Schema-version</span><span class="admin-val">${e.schemaVersion||1}</span></div>
      <div class="admin-row"><span class="admin-key">Production status</span><span class="admin-val"><span class="admin-status-pill ${intern.productionStatus}">${intern.productionStatus}</span></span></div>
      <div class="admin-row"><span class="admin-key">Skapad</span><span class="admin-val">${intern.createdAt||'—'}</span></div>
      <div class="admin-row"><span class="admin-key">Skapad av</span><span class="admin-val">${intern.createdBy||'—'}</span></div>
      ${(intern.lockedFields||[]).length ? `<div class="admin-row"><span class="admin-key">Låsta fält</span><span class="admin-val" style="font-family:monospace;color:var(--gult);">${intern.lockedFields.join(', ')}</span></div>` : ''}
    </div>

    ${intern.notes ? `
    <div class="admin-section">
      <div class="admin-section-title">📝 Interna anteckningar</div>
      <div class="admin-notes">${intern.notes}</div>
    </div>` : ''}

    <div class="admin-section">
      <div class="admin-section-title">🛡️ Safety-konfiguration</div>
      <div class="admin-row"><span class="admin-key">Säkerhetsnivå</span><span class="admin-val">${e.safety?.level||'standard'}</span></div>
      ${e.safety?.note ? `<div class="admin-row"><span class="admin-key">Notering</span><span class="admin-val" style="font-size:11px;text-align:right;max-width:60%;">${e.safety.note}</span></div>` : ''}
    </div>

    <div class="admin-section" style="border-color:rgba(16,185,129,.25);background:linear-gradient(135deg,var(--s1),rgba(16,185,129,.04));">
      <div class="admin-section-title" style="color:var(--gront)">✓ Vad som INTE exporteras till portalen</div>
      <ul style="list-style:none;padding:0;font-size:12px;color:var(--muted);line-height:1.8;">
        <li>→ <code style="color:var(--pl);background:var(--s2);padding:1px 5px;border-radius:3px;">internal.*</code> (allt under internal)</li>
        <li>&nbsp;&nbsp;&nbsp;productionStatus, qualityChecklist, notes, lockedFields,<br>&nbsp;&nbsp;&nbsp;createdAt, updatedAt, createdBy, id</li>
      </ul>
      <div style="font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-style:italic;">
        <strong style="color:var(--text)">Designprincip:</strong> Allt utanför <code style="color:var(--pl);background:var(--s2);padding:1px 5px;border-radius:3px;">internal</code> exporteras automatiskt.
        Det är OMÖJLIGT att råka exportera interna anteckningar.
      </div>
    </div>
  `;
}

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

document.addEventListener('keydown',ev=>{
  if(currentTab!=='presentation') return;
  if(ev.key==='ArrowRight'||ev.key===' '){ev.preventDefault();presNext();}
  else if(ev.key==='ArrowLeft'){ev.preventDefault();presPrev();}
});
</script>
