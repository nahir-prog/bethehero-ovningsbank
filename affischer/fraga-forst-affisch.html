<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>VI FRÅGAR FÖRST — BE THE HERO</title>
<style>
  @page { size: A4 portrait; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B2A6B;
    --blue: #2B5FBF;
    --gult: #fbbf24;
    --gront: #10b981;
    --rott: #ef4444;
    --cream: #fdf8e8;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e2e8f0;
  }

  .poster {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    background: var(--cream);
    color: var(--navy);
    padding: 22mm 18mm;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Dekorativa cirklar i bakgrunden */
  .poster::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: var(--blue);
    opacity: 0.08;
  }
  .poster::after {
    content: '';
    position: absolute;
    bottom: -120px;
    left: -120px;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: var(--gult);
    opacity: 0.15;
  }

  /* HEADER med BTH-branding */
  .poster-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--navy);
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
  }
  .poster-logo {
    width: 44px;
    height: 44px;
    background: var(--navy);
    color: white;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 22px;
  }
  .poster-brand {
    font-size: 14pt;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--navy);
  }
  .poster-brand-sub {
    font-size: 9pt;
    color: #64748b;
    margin-top: 2px;
  }

  /* HUVUDTITEL */
  .poster-titel {
    font-size: 76pt;
    font-weight: 900;
    color: var(--navy);
    line-height: 1.0;
    letter-spacing: -2px;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
  }
  .poster-titel-line {
    display: block;
  }
  .poster-titel-accent {
    color: var(--blue);
  }

  /* TUMME-INSTRUKTIONER */
  .tummen-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16mm;
    margin-bottom: 26mm;
    position: relative;
    z-index: 2;
  }
  .tumme-card {
    text-align: center;
    padding: 14mm 6mm;
    border-radius: 14px;
  }
  .tumme-card.up {
    background: rgba(16, 185, 129, 0.12);
    border: 3px solid var(--gront);
  }
  .tumme-card.down {
    background: rgba(239, 68, 68, 0.10);
    border: 3px solid var(--rott);
  }
  .tumme-icon {
    font-size: 60pt;
    line-height: 1;
    margin-bottom: 8mm;
  }
  .tumme-text {
    font-size: 18pt;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
  }
  .tumme-label {
    font-size: 11pt;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 6mm;
  }
  .tumme-card.up .tumme-label { color: var(--gront); }
  .tumme-card.down .tumme-label { color: var(--rott); }

  /* DE TRE REGLERNA */
  .regler {
    background: white;
    border-radius: 14px;
    padding: 14mm 12mm;
    box-shadow: 0 4px 14px rgba(27, 42, 107, 0.1);
    margin-bottom: 14mm;
    position: relative;
    z-index: 2;
  }
  .regler-titel {
    font-size: 11pt;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--blue);
    text-align: center;
    margin-bottom: 10mm;
  }
  .regel {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8mm;
  }
  .regel:last-child { margin-bottom: 0; }
  .regel-nr {
    width: 42px;
    height: 42px;
    background: var(--gult);
    color: var(--navy);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 20pt;
    flex-shrink: 0;
  }
  .regel-text {
    font-size: 16pt;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.3;
  }

  /* FOOTER */
  .poster-footer {
    margin-top: auto;
    padding-top: 10mm;
    border-top: 1px solid #cbd5e1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9pt;
    color: #64748b;
    position: relative;
    z-index: 2;
  }
  .poster-footer strong { color: var(--navy); }
</style>
</head>
<body>

<div class="poster">

  <div class="poster-header">
    <div class="poster-logo">H</div>
    <div>
      <div class="poster-brand">BE THE HERO</div>
      <div class="poster-brand-sub">Klassregel · Åk 2</div>
    </div>
  </div>

  <h1 class="poster-titel">
    <span class="poster-titel-line">VI</span>
    <span class="poster-titel-line poster-titel-accent">FRÅGAR</span>
    <span class="poster-titel-line">FÖRST</span>
  </h1>

  <div class="tummen-row">
    <div class="tumme-card up">
      <div class="tumme-icon">👍</div>
      <div class="tumme-text">Det känns okej</div>
      <div class="tumme-label">Tummen upp</div>
    </div>
    <div class="tumme-card down">
      <div class="tumme-icon">👎</div>
      <div class="tumme-text">Det känns inte okej</div>
      <div class="tumme-label">Tummen ner</div>
    </div>
  </div>

  <div class="regler">
    <div class="regler-titel">VÅRA TRE REGLER</div>
    <div class="regel">
      <div class="regel-nr">1</div>
      <div class="regel-text">Fråga först innan du tar någons platta.</div>
    </div>
    <div class="regel">
      <div class="regel-nr">2</div>
      <div class="regel-text">Det är okej att säga ja eller nej.</div>
    </div>
    <div class="regel">
      <div class="regel-nr">3</div>
      <div class="regel-text">Säger en kompis nej — då är det nej.</div>
    </div>
  </div>

  <div class="poster-footer">
    <span><strong>BE THE HERO</strong> · bethehero.se</span>
    <span>FRÅGA FÖRST · BTH-V2-007</span>
  </div>

</div>

</body>
</html>
