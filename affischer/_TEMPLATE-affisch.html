<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════════════
  BE THE HERO — AFFISCH-TEMPLATE (v1)
  ════════════════════════════════════════════════════════════════════════

  Detta är facit-mallen för alla klassrumsaffischer i BE THE HERO.
  Kopiera filen, byt namn till {övning-slug}-affisch.html, fyll i platshållarna.

  REGLER:
  ── Måste finnas
  ──   - HERO-logo i header (../images/hero-logo-400.png)
  ──   - Kategori-label (t.ex. "KLASSREGEL", "REFLEKTION", "AVTAL")
  ──   - Målgrupp (t.ex. "Åk 2 · Digitala relationer")
  ──   - EN stor huvudrubrik (max 3 ord, 48-64pt)
  ──   - EN budskaps-sektion (tummen-kort, illustration, etc.)
  ──   - Max 3 regler/punkter i regler-boxen
  ──   - Footer: "BE THE HERO · bethehero.se" + "[ÖVNINGSTITEL] · BTH-ID"
  ──   - A4-safe margins (14mm top/bottom, 16mm vänster/höger)
  ──   - Print-CSS som döljer .print-bar och låser till en sida
  ──   - Allt innehåll i navy/dark — färg endast som accent

  ── Får INTE finnas
  ──   - Lång brödtext (max 1 mening per regel)
  ──   - Intern metadata (utkast, draft, status)
  ──   - Läraranteckningar eller pedagogiska förklaringar
  ──   - Text närmare än 14mm från sidkant
  ──   - Färg som ENDA differentiering (måste fungera i B&W)
  ──   - Mer än ETT huvudbudskap

  Variabler att ersätta:
  {{KATEGORI}}       — t.ex. "KLASSREGEL" eller "REFLEKTION"
  {{MALGRUPP}}       — t.ex. "Åk 2 · Digitala relationer"
  {{HUVUDRUBRIK_1}}, {{HUVUDRUBRIK_2}}, {{HUVUDRUBRIK_3}} — 1-3 rader
  {{BUDSKAP_HTML}}   — central budskaps-sektion (tummen, illustration, citat)
  {{REGEL_1}}, {{REGEL_2}}, {{REGEL_3}} — max 3 regler
  {{OVNING_TITEL}}   — t.ex. "FRÅGA FÖRST"
  {{BTH_ID}}         — t.ex. "BTH-V2-007"
-->
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>{{OVNING_TITEL}} — affisch · BE THE HERO</title>
<style>
  /* ── PRINT BASE — kopiera oförändrat ── */
  @page { size: A4 portrait; margin: 0; }
  @media print {
    html, body {
      background: #fff !important;
      width: 210mm !important;
      height: 297mm !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
    }
    .screen-only, .print-bar { display: none !important; visibility: hidden !important; height: 0 !important; }
    .poster {
      width: 210mm !important;
      height: 297mm !important;
      margin: 0 !important;
      box-shadow: none !important;
      page-break-after: avoid !important;
      page-break-inside: avoid !important;
      break-inside: avoid !important;
      break-after: avoid !important;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B2A6B;
    --blue: #2B5FBF;
    --gult: #F5C42E;
    --gront: #16A34A;
    --rott:  #DC2626;
    --cream: #FFFBED;
    --text:  #1B2A6B;
    --muted: #64748b;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e2e8f0;
    color: var(--text);
  }

  /* SCREEN-ONLY: Skriv ut-knapp */
  .print-bar { position: fixed; top: 14px; right: 14px; z-index: 999; }
  .print-bar button {
    background: var(--navy); color: #fff; border: 0;
    padding: 9px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }

  /* ── A4 POSTER ── */
  .poster {
    width: 210mm;
    height: 297mm;
    margin: 14px auto;
    background: var(--cream);
    padding: 14mm 16mm;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  }

  /* Dekorativa cirklar — INNE i safe area, opacity låg så B&W är klar */
  .deco { position: absolute; border-radius: 50%; z-index: 0; pointer-events: none; }
  .deco-1 { top: -50mm; right: -50mm; width: 130mm; height: 130mm; background: var(--blue); opacity: 0.07; }
  .deco-2 { bottom: -60mm; left: -55mm; width: 150mm; height: 150mm; background: var(--gult); opacity: 0.14; }
  .poster > *:not(.deco) { position: relative; z-index: 1; }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 6mm;
    border-bottom: 1pt solid var(--navy);
    margin-bottom: 9mm;
  }
  .header-logo { height: 13mm; width: auto; display: block; }
  .header-meta {
    margin-left: auto; text-align: right;
    font-size: 8.5pt; color: var(--muted); line-height: 1.35;
  }
  .header-meta strong {
    color: var(--navy); font-weight: 800; display: block;
    font-size: 9.5pt; letter-spacing: 1.2px;
  }

  /* ── HUVUDTITEL ── */
  .titel {
    font-size: 58pt;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -1.5px;
    color: var(--navy);
    margin-bottom: 10mm;
  }
  .titel-line { display: block; }
  .titel-accent { color: var(--blue); }

  /* ── BUDSKAPS-SEKTION — anpassa per affisch (tummen, citat, illustration) ── */
  .budskap { margin-bottom: 9mm; }

  /* ── REGLER ── */
  .regler {
    background: #fff;
    border-radius: 7mm;
    padding: 9mm 8mm;
    box-shadow: 0 2pt 8pt rgba(27, 42, 107, 0.10);
  }
  .regler-titel {
    font-size: 9.5pt; font-weight: 800; letter-spacing: 2px;
    color: var(--blue); text-align: center; margin-bottom: 6mm;
  }
  .regel { display: flex; align-items: center; gap: 5mm; margin-bottom: 5mm; }
  .regel:last-child { margin-bottom: 0; }
  .regel-nr {
    width: 11mm; height: 11mm;
    background: var(--gult); color: var(--navy);
    border: 1.5pt solid var(--navy);  /* B&W: säkrar att numret syns även utan färg */
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 15pt; flex-shrink: 0;
  }
  .regel-text {
    font-size: 12.5pt; font-weight: 700; color: var(--navy); line-height: 1.3;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: auto;
    padding-top: 5mm;
    border-top: 0.75pt solid #cbd5e1;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 8pt; color: var(--muted);
  }
  .footer strong { color: var(--navy); }
</style>
</head>
<body>

<div class="print-bar screen-only">
  <button onclick="window.print()">Skriv ut</button>
</div>

<div class="poster">
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <!-- HEADER — kopiera utan ändring -->
  <div class="header">
    <img class="header-logo" src="../images/hero-logo-400.png" alt="BE THE HERO">
    <div class="header-meta">
      <strong>{{KATEGORI}}</strong>
      {{MALGRUPP}}
    </div>
  </div>

  <!-- HUVUDTITEL — max 3 rader, 1-3 ord per rad -->
  <h1 class="titel">
    <span class="titel-line">{{HUVUDRUBRIK_1}}</span>
    <span class="titel-line titel-accent">{{HUVUDRUBRIK_2}}</span>
    <span class="titel-line">{{HUVUDRUBRIK_3}}</span>
  </h1>

  <!-- BUDSKAP — anpassa per affisch (tummen-kort, citat, illustration) -->
  <div class="budskap">
    {{BUDSKAP_HTML}}
  </div>

  <!-- REGLER — max 3 -->
  <div class="regler">
    <div class="regler-titel">VÅRA REGLER</div>
    <div class="regel">
      <div class="regel-nr">1</div>
      <div class="regel-text">{{REGEL_1}}</div>
    </div>
    <div class="regel">
      <div class="regel-nr">2</div>
      <div class="regel-text">{{REGEL_2}}</div>
    </div>
    <div class="regel">
      <div class="regel-nr">3</div>
      <div class="regel-text">{{REGEL_3}}</div>
    </div>
  </div>

  <!-- FOOTER — kopiera utan ändring, byt bara övnings-ID -->
  <div class="footer">
    <span><strong>BE THE HERO</strong> · bethehero.se</span>
    <span>{{OVNING_TITEL}} · {{BTH_ID}}</span>
  </div>
</div>

</body>
</html>
