<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BE THE HERO — Övningsbank</title>
<style>
:root {
  --bg:#0d1117; --s1:#161b27; --s2:#1e2535; --s3:#252d40;
  --border:#2a3249; --purple:#7c3aed; --ph:#6d28d9; --pl:#a78bfa; --pp:rgba(124,58,237,.12);
  --text:#e8edf8; --muted:#7a8499; --dim:#4a5568;
  --gult:#f59e0b; --gront:#10b981; --blatt:#3b82f6; --rott:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
button,input,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}

/* ══ TOPBAR ══ */
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:16px;position:sticky;top:0;z-index:200;}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.brand-h{width:28px;height:28px;background:var(--purple);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;}
.brand-name{font-size:13px;font-weight:800;}
.brand-sub{font-size:10px;color:var(--muted);}
.topbar-sep{width:1px;height:24px;background:var(--border);}
.top-tabs{display:flex;gap:2px;}
.top-tab{background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:5px 11px;border-radius:5px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;}
.top-tab:hover{color:var(--text);background:var(--s2);}
.top-tab.on{color:var(--pl);background:var(--pp);}
.top-tab .tc{font-size:10px;background:var(--s3);color:var(--dim);padding:1px 5px;border-radius:8px;min-width:18px;text-align:center;transition:all .12s;}
.top-tab.on .tc{background:var(--purple);color:#fff;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sort-sel{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 9px;border-radius:5px;outline:none;cursor:pointer;}

/* ══ LAYOUT ══ */
#app{display:flex;min-height:calc(100vh - 52px);}
.sidebar{width:210px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ══ SIDEBAR ══ */
.clear-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;padding:6px;border-radius:5px;cursor:pointer;margin-bottom:12px;transition:all .12s;letter-spacing:.3px;}
.clear-btn:hover{border-color:var(--rott);color:var(--rott);}
.clear-btn.has-filters{border-color:rgba(239,68,68,.4);color:var(--rott);background:rgba(239,68,68,.06);}
.f-label{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block;}
.f-divider{height:1px;background:var(--border);margin:10px 0;}

/* Year grid */
.year-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:2px;}
.yb{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;padding:5px 2px;border-radius:4px;cursor:pointer;text-align:center;transition:all .12s;}
.yb:hover{color:var(--text);}
.yb.on{background:var(--pp);border-color:var(--purple);color:var(--pl);}
.yb.zero{opacity:.35;}
.yb .yc{display:block;font-size:8px;font-weight:400;color:var(--dim);}
.yb.on .yc{color:var(--pl);opacity:.7;}

/* Filter buttons */
.f-group{display:flex;flex-direction:column;gap:2px;}
.fb{background:transparent;border:1px solid transparent;color:var(--muted);font-size:11px;padding:5px 8px;border-radius:4px;cursor:pointer;text-align:left;transition:all .1s;display:flex;justify-content:space-between;align-items:center;width:100%;}
.fb:hover{background:var(--s2);color:var(--text);}
.fb.on{background:var(--pp);border-color:rgba(124,58,237,.3);color:var(--pl);font-weight:600;}
.fb .fc{font-size:9px;color:var(--dim);background:var(--s3);padding:1px 4px;border-radius:3px;}
.fb.on .fc{color:var(--pl);background:rgba(124,58,237,.2);}

/* ══ WORKSPACE HEADER ══ */
.ws-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--s1);}
.ws-count{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.active-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.achip{display:flex;align-items:center;gap:5px;background:var(--pp);border:1px solid rgba(124,58,237,.25);color:var(--pl);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;}
.achip-x{background:transparent;border:none;color:var(--pl);font-size:13px;cursor:pointer;line-height:1;padding:0 0 0 2px;opacity:.7;}
.achip-x:hover{opacity:1;}
.search-wrap{position:relative;}
.search-wrap input{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 12px 6px 30px;border-radius:5px;outline:none;width:200px;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--purple);width:240px;}
.search-wrap input::placeholder{color:var(--muted);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}

/* ══ GRID ══ */
.grid-area{flex:1;padding:16px 18px;overflow-y:auto;}
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:10px;}

/* ══ CARD ══ */
.card{background:var(--s1);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.card:hover{border-color:var(--purple);box-shadow:0 3px 14px rgba(124,58,237,.1);}
.card-stripe{height:3px;width:100%;}
.card-stripe.klar{background:var(--gront);}
.card-stripe.utkast{background:var(--dim);}
.card-stripe.granskas{background:var(--gult);}
.card-stripe.publicerad{background:var(--pl);}
.card-body{padding:13px 14px 11px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:7px;}
.card-title{font-size:13px;font-weight:800;line-height:1.2;flex:1;}
.card-qbtns{display:flex;gap:2px;flex-shrink:0;}
.qb{background:transparent;border:none;font-size:14px;padding:2px 3px;cursor:pointer;opacity:.35;transition:opacity .12s;line-height:1;}
.qb:hover,.qb.on{opacity:1;}
.card-years{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;}
.cy{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--pp);color:var(--pl);border:1px solid rgba(124,58,237,.18);}
.card-temas{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.ct{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--s2);border:1px solid var(--border);color:var(--muted);}
.card-meta{display:flex;gap:10px;font-size:11px;color:var(--muted);margin-bottom:7px;}
.card-flags{display:flex;flex-wrap:wrap;gap:4px;}
.cf{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid var(--border);background:var(--s2);color:var(--muted);}
.cf.warn{border-color:rgba(245,158,11,.3);color:var(--gult);background:rgba(245,158,11,.05);}
.cf.kort{border-color:rgba(124,58,237,.3);color:var(--pl);background:var(--pp);}
.cf.prod{border-color:rgba(59,130,246,.3);color:var(--blatt);background:rgba(59,130,246,.05);}
.cf.new{border-color:rgba(16,185,129,.3);color:var(--gront);background:rgba(16,185,129,.05);}
.cf.used{border-color:rgba(16,185,129,.3);color:var(--gront);}

/* ══ TEACHER VIEW ══ */
#view-teacher{display:none;flex:1;overflow-y:auto;}
.tv-topbar{position:sticky;top:0;z-index:100;background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tv-left{display:flex;align-items:center;gap:10px;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:6px 11px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .12s;}
.back-btn:hover{color:var(--text);border-color:var(--pl);}
.tv-title{font-size:14px;font-weight:800;color:var(--text);}
.tv-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.tv-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;}
.tv-btn:hover{color:var(--text);border-color:var(--pl);}
.tv-btn.fav.on{color:var(--gult);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.07);}
.tv-btn.used.on{color:var(--gront);border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.07);}
.start-btn{background:var(--purple);color:#fff;border:none;font-size:13px;font-weight:700;padding:7px 18px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.start-btn:hover{background:var(--ph);}
.tv-body{max-width:980px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:1fr 250px;gap:20px;}
.tv-main{display:flex;flex-direction:column;gap:16px;}
.tv-aside{display:flex;flex-direction:column;gap:12px;}

/* TV flags */
.tv-flags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tvf{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid transparent;display:flex;align-items:center;gap:4px;}
.tvf.warn{color:var(--gult);background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.2);}
.tvf.ok{color:var(--gront);background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.15);}
.tvf.info{color:var(--muted);background:var(--s2);border-color:var(--border);}
.tvf.kort{color:var(--pl);background:var(--pp);border-color:rgba(124,58,237,.25);}

/* TV header */
.tv-alder{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tv-ap{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--pp);border:1px solid rgba(124,58,237,.22);color:var(--pl);}
.tv-h1{font-size:26px;font-weight:900;margin-bottom:6px;line-height:1.1;}
.tv-meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.tv-mtag{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;}
.tv-syfte{font-size:14px;color:#b0bcd4;line-height:1.65;max-width:600px;}

/* Sections */
.ts{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.ts-h{display:flex;align-items:center;gap:7px;padding:11px 15px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.015);}
.ts-icon{font-size:15px;}
.ts-title{font-size:12px;font-weight:800;letter-spacing:.2px;}
.ts-b{padding:15px;}

/* Steps */
.step-list{display:flex;flex-direction:column;gap:1px;}
.step{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.step:last-child{border-bottom:none;}
.sn{width:24px;height:24px;background:var(--purple);color:#fff;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.st{font-size:13px;color:#c8d3e8;line-height:1.5;flex:1;}

/* Prose, refs, trygg */
.prose{font-size:13px;color:#b0bcd4;line-height:1.65;}
.ref-list{display:flex;flex-direction:column;gap:1px;}
.ri{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:#b0bcd4;align-items:flex-start;}
.ri:last-child{border-bottom:none;}
.rq{color:var(--pl);font-weight:800;flex-shrink:0;font-size:14px;}
.trygg-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tb{background:var(--s2);border-radius:6px;padding:12px;font-size:12px;color:#b0bcd4;line-height:1.6;}
.tbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.tbl.start{color:var(--gront);}.tbl.slut{color:var(--blatt);}

/* Forskning */
.fb-box{background:var(--s2);border-radius:6px;padding:12px;font-size:13px;color:#b0bcd4;line-height:1.65;}
.kbadge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;background:var(--pp);color:var(--pl);padding:2px 6px;border-radius:3px;margin-bottom:7px;}

/* Prod box */
.prod-b{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.2);border-radius:6px;padding:13px;}
.prod-types{display:flex;gap:5px;margin-bottom:8px;}
.pbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.pbadge.voiceover{background:rgba(16,185,129,.1);color:var(--gront);border:1px solid rgba(16,185,129,.2);}
.pbadge.film{background:rgba(239,68,68,.1);color:var(--rott);border:1px solid rgba(239,68,68,.2);}
.pbadge.quiz{background:var(--pp);color:var(--pl);border:1px solid rgba(124,58,237,.2);}
.prod-desc{font-size:13px;color:#b0bcd4;margin-bottom:10px;line-height:1.6;}
.prod-manus{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:9px;font-size:11px;color:#7a8499;font-family:monospace;white-space:pre-wrap;line-height:1.55;max-height:120px;overflow-y:auto;}
.prod-prompt{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.2);border-radius:4px;padding:9px;font-size:11px;color:var(--gront);font-style:italic;margin-top:7px;line-height:1.6;}
.plbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}

/* Sidebar cards */
.sc{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:13px;}
.sc-t{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.sr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sr:last-child{border-bottom:none;}
.sk{color:var(--muted);}
.sv{font-weight:600;font-size:11px;text-align:right;}
.sp{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;}
.sp.utkast{background:rgba(74,85,104,.15);color:#9ca3af;}
.sp.granskas{background:rgba(245,158,11,.1);color:var(--gult);}
.sp.klar{background:rgba(16,185,129,.1);color:var(--gront);}
.sp.publicerad{background:var(--pp);color:var(--pl);}
.notes-ta{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 10px;border-radius:5px;outline:none;resize:vertical;min-height:65px;line-height:1.5;}
.notes-ta:focus{border-color:var(--purple);}
.notes-ta::placeholder{color:var(--muted);}
.tema-pills{display:flex;flex-wrap:wrap;gap:4px;}
.tp{font-size:11px;font-weight:600;padding:2px 7px;border-radius:3px;background:var(--pp);color:var(--pl);border:1px solid rgba(124,58,237,.2);}

/* ══ PRODUKTION TAB ══ */
#view-prod{display:none;flex:1;overflow-y:auto;padding:20px;}
.prod-list{display:flex;flex-direction:column;gap:12px;max-width:760px;margin:0 auto;}
.pcard{background:var(--s1);border:1px solid rgba(59,130,246,.2);border-radius:8px;overflow:hidden;}
.pcard-h{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pcard-info{flex:1;}
.pcard-t{font-size:14px;font-weight:800;}
.pcard-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.pcard-b{padding:13px 15px;}

/* ══ PRESENTATION ══ */
#view-pres{display:none;position:fixed;inset:0;z-index:1000;overflow:hidden;background:#080d14;}
/* Dark mode (default) */
#view-pres{--pt:#fff;--pt2:rgba(255,255,255,.75);--pm:rgba(255,255,255,.35);--pb:#080d14;--ps:rgba(255,255,255,.04);--pborder:rgba(255,255,255,.08);--parr:rgba(255,255,255,.05);--ptrack:rgba(255,255,255,.1);}
/* Light mode */
#view-pres.light{--pt:#1a1a2e;--pt2:rgba(0,0,0,.8);--pm:rgba(0,0,0,.45);--pb:#f0f2f8;--ps:rgba(0,0,0,.04);--pborder:rgba(0,0,0,.1);--parr:rgba(0,0,0,.06);--ptrack:rgba(0,0,0,.12);background:#f0f2f8;}
#view-pres.light .pnav{background:rgba(240,242,248,.9);}
#view-pres.light .px{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.12);color:rgba(0,0,0,.5);}
#view-pres.light .px:hover{background:rgba(0,0,0,.12);color:#1a1a2e;}
#view-pres.light .parrs{background:rgba(240,242,248,.9);}
#view-pres.light .parr{background:var(--parr);border-color:var(--pborder);}
#view-pres.light .pd{background:rgba(0,0,0,.15);}
#view-pres.light .pcnt{color:rgba(0,0,0,.3);}
.p-bg{position:absolute;inset:0;pointer-events:none;transition:opacity .5s;}
#view-pres.light .p-bg{opacity:.3;}
.pnav{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10;background:rgba(8,13,20,.6);backdrop-filter:blur(10px);}
.pnav-left{display:flex;align-items:center;gap:8px;}
.px{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);width:34px;height:34px;border-radius:6px;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.px:hover{background:rgba(255,255,255,.14);color:#fff;}
.pmode-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:14px;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.pmode-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
#view-pres.light .pmode-btn{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.12);color:rgba(0,0,0,.45);}
.pprog{display:flex;align-items:center;gap:10px;}
.pdots{display:flex;gap:4px;}
.pd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .25s;}
.pd.on{width:20px;border-radius:3px;}
.pcnt{font-size:11px;color:rgba(255,255,255,.3);}
.pstage{position:absolute;inset:50px 0 72px 0;display:flex;align-items:center;justify-content:center;padding:32px;}
.slide{display:none;width:100%;max-width:860px;}
.slide.on{display:block;animation:sIn .28s cubic-bezier(.2,.8,.4,1);}
@keyframes sIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── INTRO SLIDE ── */
.s-intro{text-align:center;}
.s-intro-logo{width:80px;height:auto;margin:0 auto 18px;display:block;filter:drop-shadow(0 4px 16px rgba(0,0,0,.4));}
.s-intro-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--pborder);color:var(--pm);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:16px;background:var(--ps);}
.s-intro-title{font-size:clamp(26px,4.5vw,52px);font-weight:900;color:var(--pt);line-height:1.1;margin-bottom:14px;letter-spacing:-.5px;}
.s-intro-meta{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
.s-intro-tag{background:var(--ps);border:1px solid var(--pborder);color:var(--pt2);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;}
.s-intro-trygg{border:1px solid rgba(16,185,129,.25);border-radius:9px;padding:12px 16px;max-width:480px;margin:0 auto;text-align:left;background:rgba(16,185,129,.06);}
.s-intro-trygg-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#10b981;margin-bottom:5px;}
.s-intro-trygg-t{font-size:13px;color:var(--pt2);line-height:1.5;font-style:italic;}

/* ── STEP SLIDE ── */
.s-step-wrap{display:flex;gap:18px;align-items:flex-start;}
.s-num{width:44px;height:44px;border-radius:50%;font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;}
.s-body{font-size:clamp(18px,2.8vw,28px);color:var(--pt);line-height:1.5;}

/* ── PROJEKTOR / SCENARIO SLIDE ── */
.s-proj{border-left:4px solid;border-radius:0 12px 12px 0;background:var(--ps);padding:26px 30px;}
.s-rub{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.s-rub::after{content:'';flex:1;height:1px;background:var(--pborder);}
.s-text{font-size:clamp(20px,3vw,34px);font-weight:700;color:var(--pt);line-height:1.4;margin-bottom:10px;white-space:pre-line;}
.s-uppg{font-size:13px;color:var(--pm);font-style:italic;}

/* ── TIMER ── */
.timer-wrap{display:flex;align-items:center;gap:18px;margin-top:20px;padding:14px 18px;background:var(--ps);border:1px solid var(--pborder);border-radius:10px;}
.timer-ring-wrap{position:relative;width:70px;height:70px;flex-shrink:0;}
.timer-ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--ptrack);stroke-width:5;}
.timer-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;color:var(--pt);font-variant-numeric:tabular-nums;}
.timer-controls{display:flex;flex-direction:column;gap:7px;}
.timer-start{color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;gap:6px;}
.timer-start:hover{opacity:.85;}
.timer-start.running{background:rgba(239,68,68,.8)!important;}
.timer-reset{background:transparent;border:1px solid var(--pborder);color:var(--pm);padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;transition:all .15s;}
.timer-reset:hover{color:var(--pt);border-color:var(--pt2);}
.timer-label{font-size:11px;color:var(--pm);line-height:1.4;}

/* ── MITT VAL SLIDE ── */
.mv-q{font-size:clamp(18px,2.6vw,28px);font-weight:800;color:var(--pt);line-height:1.35;text-align:center;margin-bottom:24px;}
.mv-opts{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.mvo{border-radius:10px;padding:17px 19px;display:flex;align-items:center;gap:13px;}
.mvo.gult{background:rgba(245,158,11,.1);border:2px solid rgba(245,158,11,.35);}
.mvo.gront{background:rgba(16,185,129,.08);border:2px solid rgba(16,185,129,.3);}
.mvo.blatt{background:rgba(59,130,246,.08);border:2px solid rgba(59,130,246,.3);}
.mvo.rott{background:rgba(239,68,68,.08);border:2px solid rgba(239,68,68,.3);}
.mvsq{width:38px;height:38px;border-radius:7px;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.25);}
.mvsq.gult{background:linear-gradient(135deg,#f6c84a,#f59e0b);}
.mvsq.gront{background:linear-gradient(135deg,#34d399,#10b981);}
.mvsq.blatt{background:linear-gradient(135deg,#60a5fa,#3b82f6);}
.mvsq.rott{background:linear-gradient(135deg,#f87171,#ef4444);}
.mvct{font-size:clamp(13px,1.9vw,17px);font-weight:600;color:var(--pt);line-height:1.3;}
#view-pres.light .mvo.gult{background:rgba(245,158,11,.08);}
#view-pres.light .mvo.gront{background:rgba(16,185,129,.07);}
#view-pres.light .mvo.blatt{background:rgba(59,130,246,.07);}
#view-pres.light .mvo.rott{background:rgba(239,68,68,.07);}

/* ── REFLEKTION ── */
.s-ref-wrap{position:relative;padding:32px 36px;}
.s-ref-mark{position:absolute;top:16px;left:8px;font-size:90px;font-family:Georgia,serif;line-height:1;pointer-events:none;color:var(--pborder);}
.s-ref-qs{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.s-ref-qs::after{content:'';flex:1;height:1px;background:var(--pborder);}
.s-refq{font-size:clamp(22px,3.8vw,44px);font-weight:900;color:var(--pt);line-height:1.25;}

/* ── AVSLUTNING ── */
.s-av{text-align:center;padding:20px;}
.s-av-img{width:70px;height:auto;margin:0 auto 16px;display:block;opacity:.7;}
.s-av-l{font-size:10px;font-weight:800;letter-spacing:2px;color:#3b82f6;text-transform:uppercase;margin-bottom:12px;}
.s-av-t{font-size:clamp(17px,2.6vw,26px);color:var(--pt2);line-height:1.55;max-width:580px;margin:0 auto;font-style:italic;}

/* ── SCENARIO_VISUAL — scen med inline-illustration ── */
.s-sv-wrap{display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:center;}
.s-sv-illus{width:240px;height:240px;display:flex;align-items:center;justify-content:center;}
.s-sv-illus svg{width:100%;height:100%;}
.s-sv-body{display:flex;flex-direction:column;gap:14px;}
.s-sv-rub{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--tc,var(--pl));display:flex;align-items:center;gap:8px;}
.s-sv-rub::after{content:'';flex:1;height:1px;background:var(--pborder);}
.s-sv-text{font-size:clamp(18px,2.6vw,28px);font-weight:700;color:var(--pt);line-height:1.4;white-space:pre-line;}
.s-sv-uppg{font-size:13px;color:var(--pm);font-style:italic;}
/* Lugn fade-in + subtil loopande andning — aldrig distraherande */
@keyframes appearGently {
  from { opacity: 0; transform: scale(.92); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes breatheGently {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.025); opacity: .94; }
}
.bubble-pop {
  opacity: 0;
  transform-origin: center;
  animation:
    appearGently 1.6s ease-out forwards,
    breatheGently 6s ease-in-out infinite 1.6s;
}
.bubble-pop.d1 { animation-delay: 0s, 1.6s; }
.bubble-pop.d2 { animation-delay: 0.8s, 2.4s; }
.bubble-pop.d3 { animation-delay: 1.6s, 3.2s; }
.bubble-pop.d4 { animation-delay: 2.4s, 4.0s; }

/* ── COUNTDOWN — stor fristående nedräkning ── */
.s-cd-wrap{text-align:center;padding:30px 20px;}
.s-cd-rub{font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--tc,var(--pl));margin-bottom:16px;}
.s-cd-text{font-size:clamp(16px,2.2vw,22px);color:var(--pt2);margin-bottom:28px;line-height:1.4;max-width:520px;margin-left:auto;margin-right:auto;}
.s-cd-ring{position:relative;width:240px;height:240px;margin:0 auto 24px;}
.s-cd-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.s-cd-track{fill:none;stroke:var(--ptrack);stroke-width:8;}
.s-cd-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s;}
.s-cd-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:900;color:var(--pt);font-variant-numeric:tabular-nums;}
.s-cd-btn{color:#fff;border:none;padding:12px 32px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.s-cd-btn:hover{opacity:.85;}
.s-cd-btn.running{background:rgba(239,68,68,.85)!important;}

/* ── FYSISK_LINJE — animerad linje för rörelseövningar ── */
.s-fl-wrap{padding:20px;}
.s-fl-rub{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--tc,var(--pl));margin-bottom:14px;}
.s-fl-text{font-size:clamp(18px,2.5vw,26px);font-weight:700;color:var(--pt);line-height:1.4;margin-bottom:24px;}
.s-fl-line{position:relative;width:100%;height:80px;margin:32px 0 16px;}
.s-fl-track{position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);border-radius:3px;background:var(--ptrack);}
.s-fl-end{position:absolute;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pt2);max-width:140px;background:var(--pb);padding:6px 10px;border-radius:5px;border:1px solid var(--pborder);}
.s-fl-end.left{left:0;text-align:left;}
.s-fl-end.right{right:0;text-align:right;}
.s-fl-dot{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 4px var(--pb),0 4px 14px rgba(0,0,0,.4);}
.s-fl-dot.a1{animation:flMove1 6s ease-in-out infinite;}
.s-fl-dot.a2{animation:flMove2 5s ease-in-out infinite;animation-delay:.4s;}
.s-fl-dot.a3{animation:flMove3 7s ease-in-out infinite;animation-delay:.8s;}
.s-fl-dot.a4{animation:flMove4 5.5s ease-in-out infinite;animation-delay:1.2s;}
.s-fl-dot.a5{animation:flMove5 6.5s ease-in-out infinite;animation-delay:.2s;}
@keyframes flMove1{0%,100%{left:20%}50%{left:75%}}
@keyframes flMove2{0%,100%{left:65%}50%{left:30%}}
@keyframes flMove3{0%,100%{left:50%}30%{left:15%}70%{left:80%}}
@keyframes flMove4{0%,100%{left:35%}50%{left:60%}}
@keyframes flMove5{0%,100%{left:80%}50%{left:25%}}

/* ── OMRÖSTNING — live-rösträkning ── */
.s-vote-wrap{padding:10px;}
.s-vote-q{font-size:clamp(18px,2.6vw,28px);font-weight:800;color:var(--pt);line-height:1.35;text-align:center;margin-bottom:22px;}
.s-vote-opts{display:flex;flex-direction:column;gap:10px;max-width:620px;margin:0 auto;}
.s-vote-row{position:relative;background:var(--ps);border:1px solid var(--pborder);border-radius:9px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:14px;overflow:hidden;transition:border-color .15s;user-select:none;}
.s-vote-row:hover{border-color:var(--pt2);}
.s-vote-fill{position:absolute;left:0;top:0;bottom:0;background:var(--tc,var(--pl));opacity:.2;transition:width .4s cubic-bezier(.34,1.56,.64,1);}
.s-vote-label{font-size:15px;font-weight:600;color:var(--pt);position:relative;z-index:1;flex:1;}
.s-vote-count{font-size:22px;font-weight:900;color:var(--pt);position:relative;z-index:1;font-variant-numeric:tabular-nums;min-width:36px;text-align:right;}
.s-vote-reset{display:block;margin:16px auto 0;background:transparent;border:1px solid var(--pborder);color:var(--pm);font-size:11px;padding:5px 14px;border-radius:5px;cursor:pointer;}
.s-vote-reset:hover{color:var(--pt);}
.s-vote-hint{text-align:center;font-size:11px;color:var(--pm);margin-top:10px;}

/* ── PULSE_CHECK — 1–5 stora siffror ── */
.s-pulse-wrap{text-align:center;padding:20px;}
.s-pulse-q{font-size:clamp(18px,2.5vw,26px);font-weight:700;color:var(--pt);line-height:1.4;margin-bottom:14px;}
.s-pulse-sub{font-size:13px;color:var(--pm);margin-bottom:30px;}
.s-pulse-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.s-pulse-num{width:88px;height:88px;border-radius:50%;border:3px solid var(--pborder);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:var(--pt);transition:all .2s;background:var(--ps);}
.s-pulse-num:hover{transform:scale(1.08);}
.s-pulse-num.p1{border-color:rgba(239,68,68,.5);color:#ef4444;}
.s-pulse-num.p2{border-color:rgba(245,158,11,.5);color:#f59e0b;}
.s-pulse-num.p3{border-color:rgba(168,162,158,.5);color:#a8a29e;}
.s-pulse-num.p4{border-color:rgba(16,185,129,.5);color:#10b981;}
.s-pulse-num.p5{border-color:rgba(59,130,246,.5);color:#3b82f6;}
.s-pulse-legend{margin-top:24px;font-size:12px;color:var(--pm);display:flex;gap:24px;justify-content:center;}

/* ── FILM_SCENARIO — kort film från Higgsfield, YouTube eller lokal fil ── */
.s-film-wrap{display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;}
.s-film-rub{font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--tc,var(--pl));display:flex;align-items:center;gap:8px;}
.s-film-rub::after{content:'';flex:1;height:1px;background:var(--pborder);}
.s-film-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--pborder);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.s-film-poster{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1f2e,#0a0d14);cursor:pointer;transition:opacity .25s;z-index:2;}
.s-film-poster.hidden{opacity:0;pointer-events:none;}
.s-film-play{width:80px;height:80px;border-radius:50%;background:var(--tc,var(--pl));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(0,0,0,.5);transition:transform .15s;}
.s-film-poster:hover .s-film-play{transform:scale(1.1);}
.s-film-play svg{width:32px;height:32px;fill:white;margin-left:4px;}
.s-film-label{position:absolute;bottom:14px;left:14px;color:rgba(255,255,255,.55);font-size:11px;font-weight:600;letter-spacing:1px;}
.s-film-video,.s-film-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;}
.s-film-text{font-size:clamp(15px,2vw,20px);color:var(--pt);line-height:1.5;}
.s-film-uppg{font-size:13px;color:var(--pm);font-style:italic;}

/* ── KARAKTÄR — berättelser för F-3 ── */
.s-char-wrap{display:grid;grid-template-columns:170px 1fr;gap:26px;align-items:center;padding:10px;}
.s-char-img{width:170px;height:170px;border-radius:50%;background:var(--ps);border:3px solid var(--tc,var(--pl));display:flex;align-items:center;justify-content:center;overflow:hidden;}
.s-char-img img{width:75%;height:75%;object-fit:contain;}
.s-char-body{display:flex;flex-direction:column;gap:10px;}
.s-char-bubble{position:relative;background:var(--ps);border:2px solid var(--tc,var(--pl));border-radius:14px;padding:18px 22px;}
.s-char-bubble::before{content:'';position:absolute;left:-12px;top:30px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:12px solid var(--tc,var(--pl));}
.s-char-name{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--tc,var(--pl));margin-bottom:6px;}
.s-char-text{font-size:clamp(15px,2vw,22px);font-weight:600;color:var(--pt);line-height:1.5;}
.s-char-uppg{font-size:13px;color:var(--pm);font-style:italic;margin-top:6px;}

/* arrows */
.parrs{position:absolute;bottom:0;left:0;right:0;height:70px;display:flex;align-items:center;justify-content:center;gap:14px;background:rgba(8,13,20,.5);backdrop-filter:blur(10px);}
.parr{background:var(--parr);border:1px solid var(--pborder);color:var(--pm);width:44px;height:44px;border-radius:9px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.parr:hover:not(:disabled){color:var(--pt);background:var(--ps);border-color:var(--pt2);}
.parr:disabled{opacity:.15;cursor:default;}
.pslbl{font-size:11px;color:var(--pm);min-width:100px;text-align:center;opacity:.6;}

/* ══ MATERIAL MODAL ══ */
.mat-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.mat-overlay.open{display:flex;}
.mat-modal{background:white;border-radius:10px;width:100%;max-width:680px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.mat-header{padding:14px 18px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;background:#f8faff;}
.mat-header-title{font-size:14px;font-weight:800;color:#1B2A6B;}
.mat-header-actions{display:flex;gap:8px;}
.mat-print-btn{background:#1B2A6B;color:white;border:none;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
.mat-print-btn:hover{background:#2B5FBF;}
.mat-close{background:transparent;border:1px solid #e2e8f0;color:#64748b;width:30px;height:30px;border-radius:5px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mat-close:hover{background:#f1f5f9;}
.mat-content{overflow-y:auto;flex:1;}
.mat-page{padding:14mm 16mm;min-height:297mm;font-family:-apple-system,sans-serif;color:#1a1a2e;background:white;position:relative;}
.mat-hero-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid #1B2A6B;padding-bottom:10px;margin-bottom:14px;}
.mat-hero-logo{width:44px;height:auto;}
.mat-h1{font-size:22px;font-weight:900;color:#1B2A6B;line-height:1.1;}
.mat-alder{font-size:11px;color:#64748b;margin-top:3px;}
.mat-namn{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.mat-namn label{font-size:11px;color:#94a3b8;white-space:nowrap;}
.mat-namn .ml{flex:1;border-bottom:1px solid #cbd5e1;height:22px;}
.mat-intro{background:#EEF4FF;border-left:3px solid #2B5FBF;padding:9px 13px;border-radius:0 5px 5px 0;margin-bottom:16px;font-size:13px;color:#1B2A6B;font-weight:500;font-style:italic;line-height:1.5;}
.mat-section-lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#2B5FBF;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mat-section-lbl::after{content:'';flex:1;height:1px;background:#cbd5e1;}
.mat-rader{margin-bottom:14px;}
.mat-rader .rlbl{font-size:12px;font-weight:600;color:#1a1a2e;margin-bottom:6px;}
.mat-rad{border-bottom:1px solid #cbd5e1;height:26px;margin-bottom:2px;}
.mat-rad-num{display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid #f1f5f9;}
.mat-rad-num .rn{font-size:11px;font-weight:700;color:#2B5FBF;width:16px;flex-shrink:0;}
.mat-rad-num .rl{flex:1;border-bottom:1px solid #cbd5e1;height:22px;}
.mat-checkboxar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.mat-cb-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#1a1a2e;}
.mat-cb{width:16px;height:16px;border:1.5px solid #cbd5e1;border-radius:3px;flex-shrink:0;}
.mat-rityta{border:1.5px dashed #cbd5e1;border-radius:6px;min-height:100px;margin-bottom:14px;background:#fafbff;display:flex;align-items:center;justify-content:center;}
.mat-rityta-lbl{font-size:11px;color:#94a3b8;font-style:italic;}
.mat-barometer{margin-bottom:14px;display:flex;gap:12px;align-items:center;}
.mat-baro-scale{display:flex;flex-direction:column;gap:2px;flex:1;}
.mat-baro-row{display:flex;align-items:center;gap:8px;height:24px;}
.mat-baro-box{width:24px;height:18px;border:1.5px solid #cbd5e1;border-radius:2px;flex-shrink:0;}
.mat-baro-lbl{font-size:11px;color:#64748b;}
.mat-superkraft{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.mat-sk{border:1.5px solid #cbd5e1;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;color:#2B5FBF;display:flex;align-items:center;gap:8px;cursor:default;}
.mat-sk-box{width:18px;height:18px;border:1.5px solid #cbd5e1;border-radius:50%;flex-shrink:0;}
.mat-ref{margin-bottom:12px;}
.mat-ref-q{font-size:12px;font-weight:600;color:#1a1a2e;margin-bottom:5px;line-height:1.4;}
.mat-footer{position:absolute;bottom:10mm;left:16mm;right:16mm;display:flex;justify-content:space-between;border-top:1px solid #e2e8f0;padding-top:7px;font-size:9px;color:#94a3b8;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:22px;right:22px;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 15px;border-radius:7px;font-size:12px;font-weight:600;z-index:3000;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;display:flex;align-items:center;gap:7px;}
.toast.show{opacity:1;transform:translateY(0);}

/* Intro animations */
.intro-visual{height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
/* Line animation for DEN OSYNLIGA LINJEN */
.anim-line{position:relative;width:300px;height:40px;}
.anim-line .line-track{position:absolute;top:50%;left:0;right:0;height:3px;transform:translateY(-50%);border-radius:2px;}
.anim-line .dot{width:16px;height:16px;border-radius:50%;position:absolute;top:50%;transform:translateY(-50%);animation:spreadDots 2s ease-in-out infinite;}
.anim-line .dot1{background:#e05c4f;animation-delay:0s;}
.anim-line .dot2{background:#4f7fe0;animation-delay:.1s;}
.anim-line .dot3{background:#4fc87f;animation-delay:.2s;}
@keyframes spreadDots{0%,100%{left:42%}33%{left:10%}66%{left:75%}}
/* Timer animation for FEMTON SEKUNDER */
.anim-timer{position:relative;width:70px;height:70px;}
.anim-timer svg{transform:rotate(-90deg);}
.anim-timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;}
@keyframes timerSpin{from{stroke-dashoffset:0}to{stroke-dashoffset:283}}
.anim-timer-fill{animation:timerSpin 15s linear infinite;fill:none;stroke-width:5;stroke-linecap:round;}
/* Cards animation for MITT VAL */
.anim-cards{display:flex;gap:8px;}
.anim-card{width:28px;height:40px;border-radius:5px;animation:cardBounce 1.5s ease-in-out infinite;}
.anim-card:nth-child(1){background:var(--gult);animation-delay:0s;}
.anim-card:nth-child(2){background:var(--gront);animation-delay:.15s;}
.anim-card:nth-child(3){background:var(--blatt);animation-delay:.3s;}
.anim-card:nth-child(4){background:var(--rott);animation-delay:.45s;}
@keyframes cardBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-h">H</div>
    <div><div class="brand-name">BE THE HERO</div><div class="brand-sub">Övningsbank</div></div>
  </div>
  <div class="topbar-sep"></div>
  <div class="top-tabs">
    <button class="top-tab on" data-tab="bank" onclick="switchTab('bank',this)">Alla övningar <span class="tc" id="tc-bank">0</span></button>
    <button class="top-tab" data-tab="fav" onclick="switchTab('fav',this)">⭐ Favoriter <span class="tc" id="tc-fav">0</span></button>
    <button class="top-tab" data-tab="oanvand" onclick="switchTab('oanvand',this)">⬜ Oanvända <span class="tc" id="tc-oanvand">0</span></button>
    <button class="top-tab" data-tab="prod" onclick="switchTab('prod',this)">🎬 Behöver produktion <span class="tc" id="tc-prod">0</span></button>
  </div>
  <div class="topbar-right">
    <select class="sort-sel" onchange="render()">
      <option value="ny">Nyast först</option>
      <option value="az">A–Ö</option>
      <option value="tid-asc">Kortast tid</option>
      <option value="tid-desc">Längst tid</option>
    </select>
  </div>
</header>

<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="clear-btn" id="clear-btn" onclick="clearFilters()">✕ Rensa alla filter</button>

    <span class="f-label">Årskurs</span>
    <div class="year-grid" id="year-grid"></div>
    <div style="margin-bottom:10px"></div>

    <div class="f-divider"></div>
    <span class="f-label">Fokustema</span>
    <div class="f-group" id="tema-group"></div>

    <div class="f-divider"></div>
    <span class="f-label">Tid</span>
    <div class="f-group">
      <button class="fb on" data-f="tid" data-v="alla" onclick="setF('tid','alla',this)">Alla <span class="fc"></span></button>
      <button class="fb" data-f="tid" data-v="10" onclick="setF('tid','10',this)">10 min</button>
      <button class="fb" data-f="tid" data-v="20" onclick="setF('tid','20',this)">20 min</button>
      <button class="fb" data-f="tid" data-v="30" onclick="setF('tid','30',this)">30 min</button>
      <button class="fb" data-f="tid" data-v="40" onclick="setF('tid','40',this)">40+ min</button>
    </div>

    <div class="f-divider"></div>
    <span class="f-label">Kort</span>
    <div class="f-group">
      <button class="fb on" data-f="kort" data-v="alla" onclick="setF('kort','alla',this)">Alla</button>
      <button class="fb" data-f="kort" data-v="MITT VAL" onclick="setF('kort','MITT VAL',this)">MITT VAL</button>
      <button class="fb" data-f="kort" data-v="HERO" onclick="setF('kort','HERO',this)">HERO-KORT</button>
      <button class="fb" data-f="kort" data-v="Inga" onclick="setF('kort','Inga',this)">Inga kort</button>
    </div>

    <div class="f-divider"></div>
    <span class="f-label">Status</span>
    <div class="f-group">
      <button class="fb on" data-f="status" data-v="alla" onclick="setF('status','alla',this)">Alla</button>
      <button class="fb" data-f="status" data-v="utkast" onclick="setF('status','utkast',this)">● Utkast</button>
      <button class="fb" data-f="status" data-v="granskas" onclick="setF('status','granskas',this)">● Granskas</button>
      <button class="fb" data-f="status" data-v="klar" onclick="setF('status','klar',this)">● Klar</button>
      <button class="fb" data-f="status" data-v="publicerad" onclick="setF('status','publicerad',this)">● Publicerad</button>
    </div>
  </aside>

  <!-- MAIN: BANK -->
  <div id="view-bank" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div class="ws-header">
      <span class="ws-count" id="ws-count">– övningar</span>
      <div class="active-chips" id="active-chips"></div>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="search" placeholder="Sök…" oninput="render()">
      </div>
    </div>
    <div class="grid-area">
      <div class="ex-grid" id="ex-grid"></div>
    </div>
  </div>

  <!-- PRODUKTION VIEW (inside app, replaces main) -->
  <div id="view-prod" style="display:none;flex:1;overflow-y:auto;padding:20px;">
    <div class="prod-list" id="prod-list"></div>
  </div>
</div>

<!-- TEACHER VIEW — outside #app so hiding #app doesn't kill it -->
<div id="view-teacher" style="display:none;position:fixed;inset:52px 0 0 0;background:var(--bg);z-index:50;overflow-y:auto;"></div>

<!-- PRESENTATION -->
<div id="view-pres">
  <div class="p-bg" id="p-bg"></div>
  <nav class="pnav">
    <div class="pnav-left">
      <button class="px" onclick="closePres()" title="Avsluta (Esc)">✕</button>
      <button class="pmode-btn" onclick="togglePresMode()" id="pmode-btn" title="Byt bakgrund">☀</button>
    </div>
    <div class="pprog">
      <div class="pdots" id="pdots"></div>
      <span class="pcnt" id="pcnt"></span>
    </div>
    <div style="width:70px"></div>
  </nav>
  <div class="pstage" id="pstage"></div>
  <div class="parrs">
    <button class="parr" id="pp" onclick="prevS()">←</button>
    <span class="pslbl" id="pslbl"></span>
    <button class="parr" id="pn" onclick="nextS()">→</button>
  </div>
</div>

<!-- MATERIAL MODAL -->
<div class="mat-overlay" id="mat-overlay" onclick="if(event.target===this)closeMat()">
  <div class="mat-modal">
    <div class="mat-header">
      <span class="mat-header-title" id="mat-title">Elevmaterial</span>
      <div class="mat-header-actions">
        <button class="mat-print-btn" onclick="printMat()">🖨 Skriv ut</button>
        <button class="mat-close" onclick="closeMat()">✕</button>
      </div>
    </div>
    <div class="mat-content" id="mat-content"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const YEARS = ['F','1','2','3','4','5','6','7','8','9'];
const TEMAN = ['Konflikter','Sociala roller','Mod & civilkurage','Digitala relationer','Empati & perspektiv','Grupptryck & normer','Mobbning & kränkningar','Gemenskap & inkludering','Självkänsla & identitet','Känslor & självreglering'];

let exercises=[], cur=null, slides=[], cSlide=0, activeTab='bank';
let selYears=new Set(), selTemas=new Set();
let fTid='alla', fKort='alla', fStatus='alla';

// ── Storage ──
const LS = {
  favs:()=>new Set(JSON.parse(localStorage.getItem('bth_f')||'[]')),
  used:()=>new Set(JSON.parse(localStorage.getItem('bth_u')||'[]')),
  notes:()=>JSON.parse(localStorage.getItem('bth_n')||'{}'),
  saveFavs:s=>localStorage.setItem('bth_f',JSON.stringify([...s])),
  saveUsed:s=>localStorage.setItem('bth_u',JSON.stringify([...s])),
  saveNotes:o=>localStorage.setItem('bth_n',JSON.stringify(o)),
};

// ── Load ──
fetch('data/exercises.json').then(r=>r.json()).then(d=>{
  exercises=d.exercises;
  buildYearGrid();
  buildTemaGroup();
  updateCounts();
  render();
});

function buildYearGrid(){
  const g=document.getElementById('year-grid');
  g.innerHTML=YEARS.map(y=>{
    const n=exercises.filter(e=>e.alder_tags.includes(y)).length;
    return`<button class="yb${n===0?' zero':''}" data-y="${y}" onclick="toggleYear('${y}',this)">${y==='F'?'F':'Åk '+y}<span class="yc">${n}</span></button>`;
  }).join('');
}

function buildTemaGroup(){
  const g=document.getElementById('tema-group');
  g.innerHTML=TEMAN.map(t=>{
    const n=exercises.filter(e=>e.fokustema.includes(t)).length;
    return`<button class="fb" data-tema="${t}" onclick="toggleTema('${t}',this)">${t}<span class="fc">${n}</span></button>`;
  }).join('');
}

function toggleYear(y,btn){
  if(selYears.has(y)){selYears.delete(y);btn.classList.remove('on');}
  else{selYears.add(y);btn.classList.add('on');}
  render();updateChips();updateClearBtn();
}

function toggleTema(t,btn){
  if(selTemas.has(t)){selTemas.delete(t);btn.classList.remove('on');}
  else{selTemas.add(t);btn.classList.add('on');}
  render();updateChips();updateClearBtn();
}

function setF(type,val,btn){
  if(type==='tid')fTid=val;
  else if(type==='kort')fKort=val;
  else if(type==='status')fStatus=val;
  document.querySelectorAll(`[data-f="${type}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();updateChips();updateClearBtn();
}

function clearFilters(){
  selYears=new Set();selTemas=new Set();fTid='alla';fKort='alla';fStatus='alla';
  document.querySelectorAll('.yb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('[data-tema]').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('[data-f]').forEach(b=>{
    b.classList.remove('on');
    if(b.dataset.v==='alla')b.classList.add('on');
  });
  document.getElementById('search').value='';
  render();updateChips();updateClearBtn();
}

function updateClearBtn(){
  const hasF=selYears.size>0||selTemas.size>0||fTid!=='alla'||fKort!=='alla'||fStatus!=='alla';
  document.getElementById('clear-btn').classList.toggle('has-filters',hasF);
}

function updateChips(){
  const c=document.getElementById('active-chips');
  let chips=[];
  selYears.forEach(y=>chips.push(`<span class="achip">${y==='F'?'F-klass':'Åk '+y}<button class="achip-x" onclick="toggleYear('${y}',document.querySelector('[data-y=\\'${y}\\']'))">×</button></span>`));
  selTemas.forEach(t=>chips.push(`<span class="achip">${t}<button class="achip-x" onclick="toggleTema('${t}',document.querySelector('[data-tema=\\'${t}\\']'))">×</button></span>`));
  if(fTid!=='alla')chips.push(`<span class="achip">${fTid==='40'?'40+ min':fTid+' min'}<button class="achip-x" onclick="setF('tid','alla',document.querySelector('[data-f=tid][data-v=alla]'))">×</button></span>`);
  if(fKort!=='alla')chips.push(`<span class="achip">${fKort}<button class="achip-x" onclick="setF('kort','alla',document.querySelector('[data-f=kort][data-v=alla]'))">×</button></span>`);
  if(fStatus!=='alla')chips.push(`<span class="achip">${fStatus}<button class="achip-x" onclick="setF('status','alla',document.querySelector('[data-f=status][data-v=alla]'))">×</button></span>`);
  c.innerHTML=chips.join('');
}

// ── Filter + sort ──
function filterEx(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const favs=LS.favs(), used=LS.used();
  return exercises.filter(e=>{
    if(activeTab==='fav'&&!favs.has(e.id))return false;
    if(activeTab==='oanvand'&&used.has(e.id))return false;
    if(q&&!e.titel.toLowerCase().includes(q)&&!e.syfte.toLowerCase().includes(q)&&!e.fokustema.join(' ').toLowerCase().includes(q))return false;
    if(selYears.size>0&&!e.alder_tags.some(a=>selYears.has(a)))return false;
    if(selTemas.size>0&&!e.fokustema.some(t=>selTemas.has(t)))return false;
    if(fTid!=='alla'){const t=parseInt(fTid);if(fTid==='40'){if(e.tid<40)return false;}else{if(e.tid!==t)return false;}}
    if(fKort!=='alla'){
      if(fKort==='MITT VAL'&&e.kort!=='MITT VAL')return false;
      if(fKort==='HERO'&&!e.kort.startsWith('HERO'))return false;
      if(fKort==='Inga'&&e.kort!=='Inga')return false;
    }
    if(fStatus!=='alla'&&e.status!==fStatus)return false;
    return true;
  });
}

function sortEx(arr){
  const s=document.querySelector('.sort-sel').value;
  return [...arr].sort((a,b)=>{
    if(s==='az')return a.titel.localeCompare(b.titel,'sv');
    if(s==='tid-asc')return a.tid-b.tid;
    if(s==='tid-desc')return b.tid-a.tid;
    return b.id.localeCompare(a.id); // ny = högt ID
  });
}

function updateCounts(){
  const favs=LS.favs(), used=LS.used();
  document.getElementById('tc-bank').textContent=exercises.length;
  document.getElementById('tc-fav').textContent=exercises.filter(e=>favs.has(e.id)).length;
  document.getElementById('tc-oanvand').textContent=exercises.filter(e=>!used.has(e.id)).length;
  document.getElementById('tc-prod').textContent=exercises.filter(e=>e.behov_produktion).length;
}

// ── Render bank ──
function render(){
  if(activeTab==='prod'){renderProd();return;}
  const filtered=sortEx(filterEx());
  const favs=LS.favs(), used=LS.used();
  document.getElementById('ws-count').textContent=filtered.length+' övning'+(filtered.length===1?'':'ar');
  const grid=document.getElementById('ex-grid');
  if(!filtered.length){grid.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><p style="font-size:13px">Inga övningar matchar filtren.</p></div>';return;}
  grid.innerHTML=filtered.map(e=>{
    const isFav=favs.has(e.id), isUsed=used.has(e.id);
    const years=e.alder_tags.map(a=>`<span class="cy">${a==='F'?'F-klass':'Åk '+a}</span>`).join('');
    return`<div class="card" onclick="showTeacher('${e.id}')">
      <div class="card-stripe ${e.status}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${e.titel}</div>
          <div class="card-qbtns">
            <button class="qb${isFav?' on':''}" onclick="event.stopPropagation();quickFav('${e.id}')" title="${isFav?'Ta bort favorit':'Lägg till favorit'}">${isFav?'⭐':'☆'}</button>
            <button class="qb${isUsed?' on':''}" onclick="event.stopPropagation();quickUsed('${e.id}')" title="${isUsed?'Markera som oanvänd':'Markera som använd'}">${isUsed?'✅':'⬜'}</button>
          </div>
        </div>
        <div class="card-years">${years}</div>
        <div class="card-temas">${e.fokustema.map(t=>`<span class="ct">${t}</span>`).join('')}</div>
        <div class="card-meta"><span>⏱ ${e.tid} min</span><span>📋 ${e.ovningstyp[0]}</span></div>
        <div class="card-flags">
          ${e.ny?'<span class="cf new">✦ Ny</span>':''}
          ${e.kan_vacka_kanslor?'<span class="cf warn">⚠ Känslor</span>':''}
          ${e.kort!=='Inga'?`<span class="cf kort">🃏 ${e.kort}</span>`:''}
          ${e.elevmaterial?`<span class="cf">📄 ${e.elevmaterial_typ}</span>`:''}
          ${e.behov_produktion?'<span class="cf prod">🎬 Produktion</span>':''}
          ${isUsed?'<span class="cf used">✓ Använd</span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function quickFav(id){
  const f=LS.favs();
  const on=f.has(id);
  on?f.delete(id):f.add(id);
  LS.saveFavs(f);
  updateCounts(); render();
  toast(on?'☆ Borttagen från favoriter':'⭐ Tillagd i favoriter');
}
function quickUsed(id){
  const u=LS.used();
  const on=u.has(id);
  on?u.delete(id):u.add(id);
  LS.saveUsed(u);
  updateCounts(); render();
  toast(on?'⬜ Markerad som oanvänd':'✅ Markerad som använd');
}

// ── Tab switching ──
function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.top-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const isBank=tab==='bank'||tab==='fav'||tab==='oanvand';
  document.getElementById('view-bank').style.display=isBank?'flex':'none';
  document.getElementById('view-prod').style.display=tab==='prod'?'flex':'none';
  if(tab==='prod')renderProd(); else render();
}

// ── Produktion ──
function renderProd(){
  const list=document.getElementById('prod-list');
  const prods=exercises.filter(e=>e.behov_produktion);
  if(!prods.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">🎬</div><p>Inga övningar behöver produktion ännu.</p></div>';return;}
  list.innerHTML=prods.map(e=>{
    const p=e.behov_produktion;
    return`<div class="pcard">
      <div class="pcard-h">
        <div class="pcard-info"><div class="pcard-t">${e.titel}</div><div class="pcard-sub">${e.alder} · ${e.fokustema.join(', ')}</div></div>
        <div class="prod-types">${p.typer.map(t=>`<span class="pbadge ${t}">${t}</span>`).join('')}</div>
      </div>
      <div class="pcard-b">
        <div class="prod-desc">${p.beskrivning}</div>
        ${p.manus?`<div class="plbl" style="color:var(--muted)">Manus / innehåll</div><div class="prod-manus">${p.manus}</div>`:''}
        ${p.elevenlabs_prompt?`<div class="plbl" style="color:var(--gront);margin-top:8px">ElevenLabs-prompt</div><div class="prod-prompt">${p.elevenlabs_prompt}</div>`:''}
        <button class="back-btn" style="margin-top:10px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted)" onclick="showTeacher('${e.id}')">Se hela övningen →</button>
      </div>
    </div>`;
  }).join('');
}

// ── Teacher view ──
function showTeacher(id){
  cur=exercises.find(e=>e.id===id);
  if(!cur)return;
  const tv=document.getElementById('view-teacher');
  tv.innerHTML=buildTeacherHTML(cur);
  tv.style.display='block';
  tv.scrollTop=0;
  updateTVbtns();
}

function showBank(){
  document.getElementById('view-teacher').style.display='none';
  document.getElementById('view-teacher').innerHTML='';
}

function updateTVbtns(){
  const favs=LS.favs(), used=LS.used();
  const fb=document.getElementById('tv-fav'), ub=document.getElementById('tv-used');
  if(fb){fb.classList.toggle('on',favs.has(cur.id));fb.innerHTML=favs.has(cur.id)?'⭐ Favorit':'☆ Favorit';}
  if(ub){ub.classList.toggle('on',used.has(cur.id));ub.innerHTML=used.has(cur.id)?'✅ Markerad':'⬜ Markera som använd';}
}
function tvFav(){quickFav(cur.id);updateTVbtns();}
function tvUsed(){quickUsed(cur.id);updateTVbtns();}

function buildTeacherHTML(e){
  const notes=LS.notes(); const n=notes[e.id]||'';
  const years=e.alder_tags.map(a=>`<span class="tv-ap">${a==='F'?'F-klass':'Åk '+a}</span>`).join('');
  const steps=e.genomforande_enkelt.map((s,i)=>`<div class="step"><div class="sn">${i+1}</div><div class="st edit-steg editable-field">${s}</div></div>`).join('');
  const refs=e.reflektionsfragor.map(r=>`<div class="ri"><span class="rq">?</span>${r}</div>`).join('');
  const sidebarMaterial=e.elevmaterial?`<div class="sc"><div class="sc-t">Elevmaterial</div><div onclick="openMat('${e.id}')" style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--s2);border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:border-color .12s" onmouseover="this.style.borderColor='var(--pl)'" onmouseout="this.style.borderColor='var(--border)'"><span>📄 ${e.elevmaterial_typ}</span><span style="color:var(--pl)">Förhandsgranska & skriv ut ↗</span></div></div>`:'';

function openMat(id){
  const e=exercises.find(x=>x.id===id);
  if(!e||!e.material_innehall)return;
  document.getElementById('mat-title').textContent=e.titel+' — '+e.elevmaterial_typ;
  document.getElementById('mat-content').innerHTML=buildMatHTML(e);
  document.getElementById('mat-overlay').classList.add('open');
}
function closeMat(){document.getElementById('mat-overlay').classList.remove('open');}
function printMat(){
  const c=document.getElementById('mat-content').innerHTML;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><title>Elevmaterial</title>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,sans-serif;}</style>
  </head><body>${c}</body></html>`);
  w.document.close();
  w.focus();
  setTimeout(()=>{w.print();},300);
}

// ── Timer state ──
let timerInterval=null, timerRemaining=0, timerTotal=0;
function toggleTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;document.getElementById('tbtn').innerHTML='▶ Fortsätt';document.getElementById('tbtn').classList.remove('running');return;}
  document.getElementById('tbtn').innerHTML='⏸ Pausa';
  document.getElementById('tbtn').classList.add('running');
  timerInterval=setInterval(()=>{
    timerRemaining--;
    updateTimerUI();
    if(timerRemaining<=0){clearInterval(timerInterval);timerInterval=null;document.getElementById('tbtn').innerHTML='✓ Klar!';document.getElementById('tbtn').classList.remove('running');}
  },1000);
}
function resetTimer(){
  clearInterval(timerInterval);timerInterval=null;
  timerRemaining=timerTotal;
  updateTimerUI();
  const btn=document.getElementById('tbtn');
  if(btn){btn.innerHTML='▶ Starta';btn.classList.remove('running');}
}
function updateTimerUI(){
  const num=document.getElementById('tnum');
  const fill=document.getElementById('tfill');
  if(!num||!fill)return;
  num.textContent=timerTotal>=60?formatTime(timerRemaining):timerRemaining;
  const R=45, C=2*Math.PI*R;
  const pct=timerRemaining/timerTotal;
  fill.style.strokeDasharray=C;
  fill.style.strokeDashoffset=C*(1-pct);
  const accent=temaAccent(cur);
  const lowTime = timerTotal>=60 ? timerRemaining<=10 : timerRemaining<=5;
  fill.style.stroke=lowTime?'#ef4444':accent.c;
  num.style.color=lowTime?'#ef4444':'';
}
function timerHTML(sec, accentColor){
  const R=45, C=2*Math.PI*R;
  const label = sec >= 60 ? formatTime(sec) : sec + ' sek';
  return`<div class="timer-wrap">
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 100 100">
        <circle class="timer-track" cx="50" cy="50" r="${R}"/>
        <circle class="timer-fill" id="tfill" cx="50" cy="50" r="${R}"
          stroke="${accentColor}" stroke-dasharray="${C}" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="tnum" style="font-size:${sec >= 60 ? '15px' : '22px'}">${label}</div>
    </div>
    <div class="timer-controls">
      <button class="timer-start" id="tbtn" onclick="toggleTimer()" style="background:${accentColor}">▶ Starta ${label}</button>
      <button class="timer-reset" onclick="resetTimer()">↺ Nollställ</button>
    </div>
  </div>`;
}

// ── Presentation ──
function buildSlides(e){
  const s=[];
  s.push({typ:'intro',titel:e.titel,syfte:e.syfte,meta:e.alder+' · '+e.tid+' min',trygg:e.trygg_start});
  let n=1;
  (e.genomforande||[]).forEach(st=>s.push({...st,n:n++}));
  (e.reflektionsfragor||[]).forEach((q,i)=>s.push({typ:'reflektion',fraga:q,nr:i+1,tot:e.reflektionsfragor.length}));
  s.push({typ:'avslutning',text:e.trygg_avslutning});
  return s;
}

function startPres(){
  if(!cur)return;
  slides=buildSlides(cur);cSlide=0;
  clearInterval(timerInterval);timerInterval=null;
  const pres=document.getElementById('view-pres');
  pres.style.display='block';
  renderPres();
}
function closePres(){
  clearInterval(timerInterval);timerInterval=null;
  clearInterval(cdInterval);cdInterval=null;
  document.getElementById('view-pres').style.display='none';
}
let presLight=false;
function togglePresMode(){
  presLight=!presLight;
  document.getElementById('view-pres').classList.toggle('light',presLight);
  document.getElementById('pmode-btn').textContent=presLight?'🌙':'☀';
}

function setPresBackground(accent){
  const bg=document.getElementById('p-bg');
  if(bg && !presLight) bg.style.background=`radial-gradient(ellipse at 65% 15%, ${accent.d} 0%, transparent 60%)`;
  else if(bg) bg.style.background='none';
  document.querySelectorAll('.pd.on').forEach(d=>d.style.background=accent.c);
}

function renderPres(){
  const s=slides[cSlide];
  const accent=temaAccent(cur);
  document.getElementById('pcnt').textContent=(cSlide+1)+' / '+slides.length;
  document.getElementById('pp').disabled=cSlide===0;
  document.getElementById('pn').disabled=cSlide===slides.length-1;
  const labels=['Intro',...(cur.genomforande||[]).map((_,i)=>'Steg '+(i+1)),...(cur.reflektionsfragor||[]).map((_,i)=>'Reflektion '+(i+1)),'Avslutning'];
  document.getElementById('pslbl').textContent=labels[cSlide]||'';
  document.getElementById('pdots').innerHTML=slides.map((_,i)=>`<div class="pd${i===cSlide?' on':''}" style="${i===cSlide?'background:'+accent.c+';width:20px':''};border-radius:3px"></div>`).join('');

  // Reset timer + countdown vid slide-byte
  clearInterval(timerInterval);timerInterval=null;
  clearInterval(cdInterval);cdInterval=null;

  let h='';

  if(s.typ==='intro'){
    const tryggClean=(s.trygg||'').replace(/^["«»""]|["«»""]$/g,'').trim();
    h=`<div class="slide on s-intro">
      ${introVisualHTML(cur, accent)}
      <div class="s-intro-badge">${cur.ovningstyp&&cur.ovningstyp[0]||'Övning'}</div>
      <div class="s-intro-title">${s.titel}</div>
      <div class="s-intro-meta">

      5:{f:'hero-kort-05-passiv-mobbare',n:'PASSIV MOBBARE'},

      12:{f:'hero-kort-12-uppmarksam',n:'UPPMÄRKSAM'},
      13:{f:'hero-kort-13-modig',n:'MODIG'},
      14:{f:'hero-kort-14-godhjartad',n:'GODHJÄRTAD'},
      15:{f:'hero-kort-15-rattvis',n:'RÄTTVIS'},
      16:{f:'hero-kort-16-konflikt',n:'KONFLIKT'},
      17:{f:'hero-kort-17-krankning',n:'KRÄNKNING'},
      18:{f:'hero-kort-18-mobbning',n:'MOBBNING'}
    };
    const nrs = s.nummer || [];
    const cols = nrs.length <= 4 ? nrs.length : (nrs.length <= 6 ? 3 : 4);

      const k = HERO_KORT[n];
      if(!k) return '';
      return `<div style="background:var(--ps);border:2px solid var(--pborder);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px;">

      </div>`;
    }).join('');
    h=`<div class="slide on">
      ${s.rubrik?`<div style="text-align:center;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:${accent.c};margin-bottom:14px;">${s.rubrik}</div>`:''}

      <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px;max-width:720px;margin:0 auto;">${cards}</div>
      ${s.uppgift?`<div style="text-align:center;font-size:13px;color:var(--pm);margin-top:18px;font-style:italic;">${s.uppgift}</div>`:''}
    </div>`;
  }

  document.getElementById('pstage').innerHTML=h;
  setPresBackground(accent);

  // Init timer UI if present
  if(s.timer_sekunder>0) updateTimerUI();
}

// ── Countdown-logik (Fas 2) ──
let cdInterval=null, cdRemaining=0, cdTotal=0;
function formatTime(sek){
  if(sek<60) return sek+'s';
  const m=Math.floor(sek/60), s=sek%60;
  return m+':'+(s<10?'0':'')+s;
}
function toggleCountdown(){
  const btn=document.getElementById('cdbtn');
  if(cdInterval){clearInterval(cdInterval);cdInterval=null;btn.innerHTML='▶ Fortsätt';btn.classList.remove('running');return;}
  btn.innerHTML='⏸ Pausa';btn.classList.add('running');
  cdInterval=setInterval(()=>{
    cdRemaining--;
    updateCountdownUI();
    if(cdRemaining<=0){clearInterval(cdInterval);cdInterval=null;btn.innerHTML='✓ Tiden är ute!';btn.classList.remove('running');}
  },1000);
}
function updateCountdownUI(){
  const num=document.getElementById('cdnum');
  const fill=document.getElementById('cdfill');
  if(!num||!fill)return;
  num.textContent=formatTime(cdRemaining);
  const R=110, C=2*Math.PI*R;
  fill.style.strokeDasharray=C;
  fill.style.strokeDashoffset=C*(1-cdRemaining/cdTotal);
  const accent=temaAccent(cur);
  fill.style.stroke=cdRemaining>cdTotal*0.15?accent.c:'#ef4444';
  num.style.color=cdRemaining>cdTotal*0.15?'var(--pt)':'#ef4444';
}

// ── Omröstningslogik (Fas 2) ──
let voteCounts=[];
function incVote(i){
  voteCounts[i]++;
  const total=Math.max(1,...voteCounts);
  voteCounts.forEach((c,idx)=>{
    const fill=document.getElementById('vfill'+idx);
    const cnt=document.getElementById('vcnt'+idx);
    if(fill) fill.style.width=(c/total*100)+'%';
    if(cnt) cnt.textContent=c;
  });
}
function resetVotes(n){
  voteCounts=Array(n).fill(0);
  for(let i=0;i<n;i++){
    const fill=document.getElementById('vfill'+i);
    const cnt=document.getElementById('vcnt'+i);
    if(fill) fill.style.width='0%';
    if(cnt) cnt.textContent='0';
  }
}

function playFilm(id, typ){
  const poster = document.getElementById(id+'-poster');
  if(poster) poster.classList.add('hidden');
  const el = document.getElementById(id);
  if(typ === 'video' && el && el.play) el.play();
  // iframe spelar automatiskt via autoplay=1
}

function stopAllVideos(){
  // Pausa lokala videor vid slidbyte
  document.querySelectorAll('video').forEach(v=>{try{v.pause();}catch(e){}});
}

function nextS(){if(cSlide<slides.length-1){stopAllVideos();cSlide++;renderPres();}}
function prevS(){if(cSlide>0){stopAllVideos();cSlide--;renderPres();}}

document.addEventListener('keydown',e=>{
  if(document.getElementById('view-pres').style.display==='block'){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextS();}
    if(e.key==='ArrowLeft'){e.preventDefault();prevS();}
    if(e.key==='Escape')closePres();
  }
});

// ── Inline editing ──
let editMode=false;
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('tv-edit-btn');
  if(editMode){
    btn.style.color='var(--gront)';btn.style.borderColor='rgba(16,185,129,.4)';btn.innerHTML='✓ Avsluta redigering';
    enableEditing();
  } else {
    btn.style.color='';btn.style.borderColor='';btn.innerHTML='✏ Redigera';
    saveEdits();
  }
}
function enableEditing(){
  document.querySelectorAll('.editable-field').forEach(el=>{
    el.contentEditable='true';
    el.style.outline='1px dashed rgba(124,58,237,.4)';
    el.style.borderRadius='3px';
    el.style.minHeight='20px';
    el.style.padding='2px 4px';
  });
}
function saveEdits(){
  document.querySelectorAll('.editable-field').forEach(el=>{
    el.contentEditable='false';
    el.style.outline='';
    el.style.padding='';
  });
  // Store in localStorage
  const id=cur.id;
  const overrides=JSON.parse(localStorage.getItem('bth_overrides')||'{}');
  overrides[id]={
    syfte: document.getElementById('edit-syfte')?.innerText||'',
    tips: document.getElementById('edit-tips')?.innerText||'',
    genomforande_enkelt_raw: [...document.querySelectorAll('.edit-steg')].map(e=>e.innerText)
  };
  localStorage.setItem('bth_overrides', JSON.stringify(overrides));
  toast('✓ Ändringar sparade lokalt');
}
